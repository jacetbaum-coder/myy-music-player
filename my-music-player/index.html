<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Music Player</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .player-container { background: #1e1e1e; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        #songList { list-style: none; padding: 0; margin-top: 20px; max-height: 400px; overflow-y: auto; width: 100%; }
        li { padding: 10px; border-bottom: 1px solid #333; cursor: pointer; }
        li:hover { background: #333; }
        audio { width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="player-container">
        <h2>My Music Player</h2>
        <audio id="audioPlayer" controls></audio>
        <h3 id="currentTitle">Select a song</h3>
        <ul id="songList">Loading songs...</ul>
    </div>

    <script>
        async function loadSongs() {
            try {
                const response = await fetch('/api/get-songs');
                const songs = await response.json();
                const list = document.getElementById('songList');
                list.innerHTML = '';
                songs.forEach(song => {
                    const li = document.createElement('li');
                    li.textContent = song.name;
                    li.onclick = () => {
                        document.getElementById('audioPlayer').src = song.webContentLink;
                        document.getElementById('audioPlayer').play();
                        document.getElementById('currentTitle').textContent = song.name;
                    };
                    list.appendChild(li);
                });
            } catch (err) {
                document.getElementById('songList').textContent = "Error loading songs.";
            }
        }
        loadSongs();
    </script>
</body>
</html>
