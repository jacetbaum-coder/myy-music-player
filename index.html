<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Cloud Collection - Infinite Playlists</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- ROOT & CORE RESET --- */
        :root {
            --spotify-green: #1db954;
            --bg-base: #000000;
            --bg-surface: #121212;
            --bg-elevated: #282828;
            --bg-highlight: #333333;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --nav-height: 70px;
            --player-height: 90px;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none !important;
        }

        body { 
            background: var(--bg-base); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            margin: 0;
            user-select: none;
        }

        /* --- DESKTOP LAYOUT --- */
        .sidebar { 
            width: 260px; 
            min-width: 200px; 
            max-width: 450px; 
            background: var(--bg-base); 
            display: flex; 
            flex-direction: column; 
            padding: 24px 16px; 
            flex-shrink: 0; 
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .main-view { 
            flex: 1; 
            background: linear-gradient(180deg, #222 0%, var(--bg-base) 100%); 
            overflow-y: auto; 
            padding: 32px; 
            position: relative; 
            scrollbar-width: thin;
            scrollbar-color: #555 transparent;
            transition: background 0.6s ease;
        }

        /* --- MOBILE FILTER PILLS --- */
        .mobile-filter-container {
            display: none; /* Hidden on Desktop */
            overflow-x: auto;
            white-space: nowrap;
            padding: 12px 16px;
            gap: 8px;
            scrollbar-width: none;
            background: var(--bg-base);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .mobile-filter-container::-webkit-scrollbar { display: none; }

        .filter-pill {
            display: inline-block;
            padding: 8px 16px;
            background: var(--bg-elevated);
            border-radius: 500px;
            font-size: 13px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }
        .filter-pill.active {
            background: var(--spotify-green);
            color: black;
        }
        .filter-pill:active { transform: scale(0.95); opacity: 0.8; }

        /* --- SEARCH INTERFACE --- */
        .search-bar-sticky {
            position: sticky;
            top: 0;
            background: var(--bg-base);
            padding: 16px 0;
            z-index: 40;
        }
        .search-input-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
        }
        .search-field {
            width: 100%;
            background: white;
            color: black;
            border-radius: 4px;
            padding: 14px 14px 14px 52px;
            font-size: 16px;
            font-weight: 700;
            border: none;
        }
        .search-field-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #535353;
            font-size: 20px;
        }

        /* --- RECENT SEARCH LIST --- */
        .recent-search-row {
            display: flex;
            align-items: center;
            padding: 8px 0;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }
        .recent-img {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--bg-elevated);
        }
        .recent-meta { flex: 1; overflow: hidden; }
        .recent-name { font-weight: 600; font-size: 15px; }
        .recent-type { color: var(--text-sub); font-size: 13px; }
        .recent-remove { color: var(--text-sub); padding: 10px; font-size: 18px; }

        /* --- TRACK LISTING --- */
        .track-row { 
            display: grid; 
            grid-template-columns: 40px 6fr 4fr 3fr 80px; 
            gap: 16px; 
            padding: 12px; 
            border-radius: 6px; 
            align-items: center; 
            color: var(--text-sub); 
            font-size: 14px; 
            transition: background 0.1s;
        }
        .track-row:hover { background: rgba(255,255,255,0.1); color: white; cursor: pointer; }
        .track-row.active-track { color: var(--spotify-green) !important; }

        /* --- DOCK & PLAYER --- */
        .player-bar { 
            height: var(--player-height); 
            background: var(--bg-base); 
            border-top: 1px solid #282828; 
            display: grid; 
            grid-template-columns: 30% 40% 30%; 
            align-items: center; 
            padding: 0 24px; 
            z-index: 100; 
            transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); 
        }

        /* --- MOBILE NAVIGATION --- */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: var(--nav-height);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            z-index: 200;
            justify-content: space-around;
            align-items: center;
            padding-bottom: var(--safe-bottom);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-sub);
            font-size: 11px;
            gap: 4px;
        }
        .nav-item.active { color: white; }
        .nav-item i { font-size: 22px; }

        /* --- ANIMATIONS & UTILS --- */
        .hidden { display: none !important; }
        .dock-hidden { transform: translateY(100%); opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- CONTEXT MENU --- */
        #context-menu { 
            position: fixed; 
            background: var(--bg-elevated); 
            border-radius: 8px; 
            padding: 6px; 
            min-width: 220px; 
            box-shadow: 0 16px 24px rgba(0,0,0,0.5); 
            z-index: 3000; 
            display: none; 
        }
        .menu-item { 
            padding: 12px 16px; 
            font-size: 14px; 
            cursor: pointer; 
            border-radius: 4px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .menu-item:hover { background: #3e3e3e; }

        /* --- MEDIA QUERIES --- */
        @media (max-width: 768px) {
            .sidebar, .resizer, .right-sidebar { display: none !important; }
            .mobile-nav { display: flex; }
            .mobile-filter-container { display: flex; }
            
            .main-view { padding: 16px; padding-bottom: 180px; }
            .track-row { grid-template-columns: 1fr 40px; padding: 14px 8px; }
            .track-row span:not(:nth-child(2)) { display: none; }

            .player-bar { 
                position: fixed;
                bottom: calc(var(--nav-height) + 10px);
                left: 10px; right: 10px;
                height: 60px;
                background: #222;
                border-radius: 8px;
                grid-template-columns: 1fr auto;
                padding: 0 12px;
                border: none;
            }
            .player-bar .flex-col { display: none; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="context-menu">
        <div class="menu-item" onclick="menuAction('like')">Add to Liked Songs <i class="far fa-heart"></i></div>
        <div class="menu-item">Add to Playlist <i class="fas fa-chevron-right text-xs"></i></div>
    </div>

    <div class="flex flex-1 overflow-hidden">
        
        <aside id="left-sidebar" class="sidebar">
            <div class="space-y-6">
                <div onclick="showView('home')" id="side-nav-home" class="flex items-center gap-4 text-white cursor-pointer font-bold">
                    <i class="fas fa-home text-2xl w-8"></i> Home
                </div>
                <div onclick="showView('search')" id="side-nav-search" class="flex items-center gap-4 text-zinc-400 cursor-pointer font-bold hover:text-white">
                    <i class="fas fa-search text-2xl w-8"></i> Search
                </div>
            </div>

            <div class="mt-10 mb-4 flex justify-between items-center text-zinc-400">
                <span class="text-xs font-bold uppercase tracking-widest">Your Library</span>
                <i onclick="createNewPlaylist()" class="fas fa-plus hover:text-white cursor-pointer"></i>
            </div>

            <div id="desktop-library-list" class="flex-1 overflow-y-auto space-y-1">
                <div onclick="showView('liked')" id="side-nav-liked" class="flex items-center gap-3 p-2 rounded hover:bg-zinc-900 cursor-pointer">
                    <div class="w-12 h-12 bg-gradient-to-br from-indigo-700 to-purple-400 rounded flex items-center justify-center shadow-lg">
                        <i class="fas fa-heart"></i>
                    </div>
                    <div class="truncate">
                        <div class="text-sm font-bold">Liked Songs</div>
                        <div class="text-xs text-zinc-400" id="count-liked">0 songs</div>
                    </div>
                </div>
                <div id="dynamic-playlists-list"></div>
                <div id="history-container" class="pt-6 border-t border-zinc-800 mt-4"></div>
            </div>
        </aside>

        <main class="main-view" id="main-scroll-area">
            
            <div class="mobile-filter-container" id="mobile-filters">
                <div class="filter-pill active" onclick="setFilter('all', this)">All</div>
                <div class="filter-pill" onclick="setFilter('playlists', this)">Playlists</div>
                <div class="filter-pill" onclick="setFilter('podcasts', this)">Podcasts</div>
                <div class="filter-pill" onclick="setFilter('audiobooks', this)">Audiobooks</div>
            </div>

            <div id="loading" class="flex flex-col items-center justify-center h-full">
                <div class="w-10 h-10 border-2 border-zinc-800 border-t-[#1db954] rounded-full animate-spin"></div>
            </div>

            <div id="grid-view" class="hidden">
                <h1 id="greeting-text" class="text-3xl font-black mb-8">Good evening</h1>
                <div id="album-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6"></div>
            </div>

            <div id="search-view" class="hidden">
                <div class="search-bar-sticky">
                    <h1 class="text-3xl font-black mb-6 md:block hidden">Search</h1>
                    <div class="search-input-wrapper">
                        <i class="fas fa-search search-field-icon"></i>
                        <input type="text" id="global-search" class="search-field" placeholder="What do you want to listen to?" oninput="handleSearch(this.value)">
                    </div>
                </div>

                <div id="search-content-area">
                    <div id="recent-search-section" class="mt-8">
                        <h2 class="text-lg font-bold mb-4">Recent searches</h2>
                        <div id="recent-search-list" class="space-y-2"></div>
                    </div>

                    <div id="search-results" class="mt-6 space-y-1"></div>
                </div>
            </div>

            <div id="album-view" class="hidden">
                <div id="album-hero" class="flex items-end gap-6 mb-10"></div>
                <div class="flex items-center gap-8 mb-8">
                    <button class="w-14 h-14 bg-[#1db954] rounded-full flex items-center justify-center hover:scale-105 transition active:scale-95 shadow-lg">
                        <i class="fas fa-play text-black text-xl ml-1"></i>
                    </button>
                    <i class="far fa-heart text-2xl text-zinc-400 hover:text-white cursor-pointer"></i>
                    <i class="fas fa-arrow-alt-circle-down text-2xl text-zinc-400"></i>
                </div>
                <div class="track-row text-xs font-bold uppercase tracking-widest border-b border-white/10 pb-2 mb-4">
                    <span>#</span><span>Title</span><span class="hidden md:block">Album</span><span class="hidden md:block">Date</span><span class="text-center md:block hidden"><i class="far fa-clock"></i></span>
                </div>
                <div id="track-list" class="space-y-1"></div>
            </div>
        </main>
    </div>

    <nav class="mobile-nav">
        <div class="nav-item active" onclick="showView('home')"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="showView('search')"><i class="fas fa-search"></i><span>Search</span></div>
        <div class="nav-item" onclick="showView('liked')"><i class="fas fa-layer-group"></i><span>Your Library</span></div>
        <div class="nav-item"><i class="fab fa-spotify"></i><span>Get App</span></div>
    </nav>

    <div id="main-dock" class="player-bar dock-hidden">
        <div class="flex items-center gap-4 overflow-hidden">
            <img id="p-cover" class="w-14 h-14 rounded shadow-lg bg-zinc-800 object-cover">
            <div class="truncate">
                <div id="p-title" class="font-bold text-sm truncate"></div>
                <div id="p-artist" class="text-xs text-zinc-400 truncate"></div>
            </div>
        </div>

        <div class="flex flex-col items-center gap-3">
            <div class="flex items-center gap-6 text-zinc-400">
                <i class="fas fa-shuffle text-sm"></i>
                <i class="fas fa-step-backward text-xl"></i>
                <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-black" onclick="togglePlay()">
                    <i id="play-icon" class="fas fa-play ml-1"></i>
                </div>
                <i class="fas fa-step-forward text-xl"></i>
                <i class="fas fa-repeat text-sm"></i>
            </div>
            <div class="w-full flex items-center gap-3 text-[10px] text-zinc-500">
                <span id="t-curr">0:00</span>
                <div class="flex-1 h-1 bg-zinc-600 rounded-full overflow-hidden">
                    <div id="progress-fill" class="h-full bg-white w-0 transition-all"></div>
                </div>
                <span id="t-total">0:00</span>
            </div>
        </div>

        <div class="flex justify-end gap-5 items-center">
            <i class="fas fa-microphone text-zinc-400"></i>
            <i class="fas fa-list-ul text-zinc-400"></i>
            <i class="fas fa-volume-up text-zinc-400"></i>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        /**
         * ---------------------------------------------------------------------
         * STATE MANAGEMENT
         * ---------------------------------------------------------------------
         */
        let libraryData = [];
        let currentSong = null;
        let recentSearches = JSON.parse(localStorage.getItem('recentSearches')) || [];
        let likedSongs = JSON.parse(localStorage.getItem('likedSongs')) || [];
        let playlists = JSON.parse(localStorage.getItem('playlists')) || [];
        let history = JSON.parse(localStorage.getItem('historyLog')) || [];
        let lastPlayedTime = localStorage.getItem('lastPlayedTime') || 0;

        const player = document.getElementById('audio-player');
        const dock = document.getElementById('main-dock');

        /**
         * ---------------------------------------------------------------------
         * INITIALIZATION
         * ---------------------------------------------------------------------
         */
        window.onload = async () => {
            renderPlaylists();
            renderRecentSearches();
            updateCounts();
            checkDockVisibility();
            initTouchEvents();
            
            try {
                // Fetching your cloud library
                const res = await fetch('/api/get-songs');
                libraryData = await res.json();
                libraryData.sort((a,b) => a.albumName.localeCompare(b.albumName));
                
                document.getElementById('loading').classList.add('hidden');
                showView('home');
            } catch(e) {
                console.error("Sync Error", e);
                document.getElementById('loading').innerHTML = `<p class="text-zinc-500">Cloud Sync Unavailable</p>`;
            }
        };

        /**
         * ---------------------------------------------------------------------
         * UI ROUTING & FILTERS
         * ---------------------------------------------------------------------
         */
        function showView(viewType) {
            ['grid-view', 'album-view', 'search-view'].forEach(id => document.getElementById(id).classList.add('hidden'));
            const scrollArea = document.getElementById('main-scroll-area');
            scrollArea.scrollTop = 0;

            if (viewType === 'home') {
                document.getElementById('grid-view').classList.remove('hidden');
                renderGrid();
            } else if (viewType === 'search') {
                document.getElementById('search-view').classList.remove('hidden');
                renderRecentSearches();
            } else if (viewType === 'liked') {
                document.getElementById('album-view').classList.remove('hidden');
                renderCollection("Liked Songs", likedSongs);
            }
            
            updateNavUI(viewType);
        }

        function updateNavUI(view) {
            const items = document.querySelectorAll('.nav-item');
            items.forEach(i => i.classList.remove('active'));
            if(view === 'home') items[0].classList.add('active');
            if(view === 'search') items[1].classList.add('active');
            if(view === 'liked') items[2].classList.add('active');
        }

        function setFilter(type, el) {
            const pills = document.querySelectorAll('.filter-pill');
            pills.forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            
            // Logic for filtering library views
            if (type === 'playlists') {
                showView('home');
                const grid = document.getElementById('album-grid');
                grid.innerHTML = `<p class="col-span-full text-zinc-500 text-center py-20">Filtering for your Playlists...</p>`;
                setTimeout(renderPlaylistsInGrid, 300);
            } else if (type === 'all') {
                showView('home');
            }
        }

        /**
         * ---------------------------------------------------------------------
         * SEARCH & HISTORY ENGINE
         * ---------------------------------------------------------------------
         */
        function handleSearch(val) {
            const results = document.getElementById('search-results');
            const recentSection = document.getElementById('recent-search-section');
            
            if (!val.trim()) {
                results.innerHTML = '';
                recentSection.classList.remove('hidden');
                return;
            }

            recentSection.classList.add('hidden');
            const query = val.toLowerCase();
            let html = '';

            libraryData.forEach(album => {
                album.songs.forEach(song => {
                    if (song.name.toLowerCase().includes(query) || album.artistName.toLowerCase().includes(query)) {
                        html += `
                        <div class="flex items-center gap-4 p-3 hover:bg-zinc-900 cursor-pointer rounded-lg group" 
                             onclick="trackSearchSelection('${song.name}','${album.artistName}','${album.coverArt}'); playSpecific('${song.link}','${song.name}','${album.artistName}','${album.coverArt}')">
                            <img src="${album.coverArt}" class="w-12 h-12 rounded object-cover shadow-lg">
                            <div class="flex-1 truncate">
                                <div class="font-bold text-white truncate">${song.name.replace('.mp3','')}</div>
                                <div class="text-sm text-zinc-400">Song • ${album.artistName}</div>
                            </div>
                            <i class="fas fa-play opacity-0 group-hover:opacity-100 text-zinc-500 mr-2"></i>
                        </div>`;
                    }
                });
            });
            results.innerHTML = html || `<p class="text-zinc-500 p-8 text-center">No results found for "${val}"</p>`;
        }

        function trackSearchSelection(name, artist, cover) {
            recentSearches = recentSearches.filter(s => s.name !== name);
            recentSearches.unshift({ name, artist, cover });
            localStorage.setItem('recentSearches', JSON.stringify(recentSearches.slice(0, 6)));
        }

        function renderRecentSearches() {
            const list = document.getElementById('recent-search-list');
            if (recentSearches.length === 0) {
                list.innerHTML = '<p class="text-zinc-500 text-sm italic">Your recent searches will appear here.</p>';
                return;
            }
            list.innerHTML = recentSearches.map((s, i) => `
                <div class="recent-search-row">
                    <img src="${s.cover}" class="recent-img">
                    <div class="recent-meta" onclick="playSpecificFromHistory(${i})">
                        <div class="recent-name">${s.name}</div>
                        <div class="recent-type">Song • ${s.artist}</div>
                    </div>
                    <i class="fas fa-times recent-remove" onclick="removeRecent(${i})"></i>
                </div>
            `).join('');
        }

        function removeRecent(idx) {
            recentSearches.splice(idx, 1);
            localStorage.setItem('recentSearches', JSON.stringify(recentSearches));
            renderRecentSearches();
        }

        /**
         * ---------------------------------------------------------------------
         * CORE PLAYER LOGIC
         * ---------------------------------------------------------------------
         */
        function playSpecific(url, title, artist, cover) {
            currentSong = { url, title, artist, cover };
            player.src = url;
            player.play();
            lastPlayedTime = Date.now();
            localStorage.setItem('lastPlayedTime', lastPlayedTime);
            
            dock.classList.remove('dock-hidden');
            document.getElementById('p-cover').src = cover;
            document.getElementById('p-title').innerText = title.replace('.mp3','');
            document.getElementById('p-artist').innerText = artist;
            document.getElementById('play-icon').className = "fas fa-pause";
            
            updateHistory(artist, cover);
        }

        function togglePlay() {
            if (player.paused) {
                player.play();
                document.getElementById('play-icon').className = "fas fa-pause";
            } else {
                player.pause();
                document.getElementById('play-icon').className = "fas fa-play ml-1";
            }
        }

        /**
         * ---------------------------------------------------------------------
         * RENDERING ENGINE
         * ---------------------------------------------------------------------
         */
        function renderGrid() {
            const grid = document.getElementById('album-grid');
            grid.innerHTML = libraryData.map(album => `
                <div class="bg-zinc-900/40 p-4 rounded-lg hover:bg-zinc-800 transition cursor-pointer group" onclick="openAlbum('${album.albumName.replace(/'/g, "\\'")}')">
                    <div class="relative mb-4">
                        <img src="${album.coverArt}" class="w-full aspect-square rounded shadow-xl object-cover group-hover:scale-[1.02] transition">
                        <div class="absolute bottom-2 right-2 w-10 h-10 bg-[#1db954] rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 shadow-2xl transition">
                             <i class="fas fa-play text-black text-sm ml-1"></i>
                        </div>
                    </div>
                    <div class="font-bold truncate text-sm mb-1">${album.albumName}</div>
                    <div class="text-xs text-zinc-400 truncate">${album.artistName}</div>
                </div>
            `).join('');
        }

        function openAlbum(name) {
            const album = libraryData.find(a => a.albumName === name);
            if(!album) return;
            document.getElementById('grid-view').classList.add('hidden');
            document.getElementById('album-view').classList.remove('hidden');
            
            document.getElementById('album-hero').innerHTML = `
                <img src="${album.coverArt}" class="w-48 h-48 md:w-64 md:h-64 shadow-2xl rounded-lg object-cover">
                <div class="flex-1">
                    <p class="text-xs font-black uppercase mb-2">Album</p>
                    <h1 class="text-4xl md:text-7xl font-black mb-6 tracking-tighter">${album.albumName}</h1>
                    <div class="flex items-center gap-2 font-bold">
                        <span class="hover:underline cursor-pointer">${album.artistName}</span>
                        <span class="text-zinc-400">• ${album.songs.length} songs</span>
                    </div>
                </div>`;
                
            const list = document.getElementById('track-list');
            list.innerHTML = album.songs.map((s, i) => `
                <div class="track-row group" onclick="playSpecific('${s.link}','${s.name}','${album.artistName}','${album.coverArt}')">
                    <span class="text-center text-zinc-500 group-hover:text-white">${i+1}</span>
                    <div class="truncate">
                        <div class="text-white font-medium truncate">${s.name.replace('.mp3','')}</div>
                        <div class="text-xs text-zinc-400 md:hidden">${album.artistName}</div>
                    </div>
                    <span class="hidden md:block truncate">${album.albumName}</span>
                    <span class="hidden md:block text-zinc-500">Dec 2025</span>
                    <span class="hidden md:block text-center text-zinc-500">3:45</span>
                </div>
            `).join('');
        }

        function renderCollection(title, songs) {
            document.getElementById('album-hero').innerHTML = `
                <div class="w-48 h-48 bg-gradient-to-br from-indigo-800 to-blue-400 flex items-center justify-center shadow-2xl rounded-lg">
                    <i class="fas fa-heart text-6xl"></i>
                </div>
                <div>
                    <p class="text-xs font-bold uppercase">Playlist</p>
                    <h1 class="text-6xl font-black mb-4">${title}</h1>
                </div>`;
            const list = document.getElementById('track-list');
            list.innerHTML = songs.length ? songs.map((s, i) => `
                <div class="track-row group" onclick="playSpecific('${s.url}','${s.title}','${s.artist}','${s.cover}')">
                    <span class="text-center">${i+1}</span>
                    <div class="truncate">${s.title}</div>
                    <span class="hidden md:block">${s.artist}</span>
                    <span class="hidden md:block">Saved</span>
                    <span class="hidden md:block text-center">--:--</span>
                </div>`).join('') : '<p class="text-zinc-500 p-20 text-center">No songs saved here yet.</p>';
        }

        /**
         * ---------------------------------------------------------------------
         * PERSISTENCE & UTILITIES
         * ---------------------------------------------------------------------
         */
        function checkDockVisibility() {
            const oneHour = 3600000;
            const isRecent = (Date.now() - lastPlayedTime < oneHour);
            if (isRecent || !player.paused) dock.classList.remove('dock-hidden');
            else dock.classList.add('dock-hidden');
        }

        function updateHistory(artist, cover) {
            history = history.filter(h => h.artist !== artist);
            history.unshift({ artist, cover });
            localStorage.setItem('historyLog', JSON.stringify(history.slice(0, 8)));
            renderPlaylists(); // Refreshing sidebar icons
        }

        function renderPlaylists() {
            const list = document.getElementById('dynamic-playlists-list');
            list.innerHTML = playlists.map(p => `
                <div class="flex items-center gap-3 p-2 rounded hover:bg-zinc-900 cursor-pointer group">
                    <div class="w-12 h-12 bg-zinc-800 flex items-center justify-center rounded shadow-md group-hover:bg-zinc-700">
                        <i class="fas fa-music text-zinc-500 group-hover:text-zinc-300"></i>
                    </div>
                    <div class="truncate">
                        <div class="text-sm font-bold truncate">${p.name}</div>
                        <div class="text-xs text-zinc-400">Playlist • ${p.songs.length} songs</div>
                    </div>
                </div>
            `).join('');
        }

        function updateCounts() {
            const el = document.getElementById('count-liked');
            if (el) el.innerText = `${likedSongs.length} songs`;
        }

        function initTouchEvents() {
            // Preventing ghost clicks on mobile and handling long-presses for context menus
            let touchTimer;
            document.addEventListener('touchstart', (e) => {
                if(e.target.closest('.track-row')) {
                    touchTimer = setTimeout(() => {
                        handleContextMenu(e, e.target.closest('.track-row'));
                    }, 600);
                }
            });
            document.addEventListener('touchend', () => clearTimeout(touchTimer));
        }

        function handleContextMenu(e, target) {
            e.preventDefault();
            const menu = document.getElementById('context-menu');
            menu.style.display = 'block';
            menu.style.left = (e.pageX || e.touches[0].pageX) + 'px';
            menu.style.top = (e.pageY || e.touches[0].pageY) + 'px';
        }

        player.ontimeupdate = () => {
            const pct = (player.currentTime / player.duration) * 100;
            document.getElementById('progress-fill').style.width = pct + "%";
            document.getElementById('t-curr').innerText = formatTime(player.currentTime);
            document.getElementById('t-total').innerText = formatTime(player.duration);
        };

        function formatTime(s) {
            const m = Math.floor(s/60);
            const sec = Math.floor(s%60);
            return `${m}:${sec < 10 ? '0'+sec : sec}`;
        }

        setInterval(checkDockVisibility, 60000);
        document.addEventListener('click', () => document.getElementById('context-menu').style.display = 'none');
    </script>
</body>
</html>
