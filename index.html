<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Cloud Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .main-view { background: linear-gradient(to bottom, #1a1a1a, #000); flex: 1; overflow-y: auto; padding: 40px; }
        .album-card { background: #181818; padding: 16px; border-radius: 8px; transition: 0.3s; cursor: pointer; }
        .album-card:hover { background: #282828; }
        .player-bar { height: 90px; background: #000; display: flex; align-items: center; padding: 0 20px; border-top: 1px solid #282828; }
        .track-row:hover { background: rgba(255,255,255,0.1); }
        .hidden { display: none; }
        /* Style for the album art in the grid */
        .cover-img { width: 100%; aspect-ratio: 1/1; object-cover: cover; border-radius: 4px; margin-bottom: 12px; background: #282828; }
    </style>
</head>
<body>
    <div id="content-area" class="main-view">
        <button id="back-btn" onclick="showGrid()" class="hidden mb-6 opacity-70 hover:opacity-100 font-bold">
            <i class="fas fa-chevron-left"></i> Back
        </button>
        <div id="album-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
        <div id="track-list" class="hidden">
            <h2 id="list-title" class="text-4xl font-bold mb-4"></h2>
            <div id="songs-container" class="space-y-1"></div>
        </div>
    </div>

    <div class="player-bar">
        <div class="w-1/3 flex flex-col justify-center">
            <div id="now-playing" class="font-bold text-sm text-zinc-100">Nothing Playing</div>
            <div id="now-artist" class="text-xs text-zinc-400"></div>
        </div>
        <div class="w-1/3 flex justify-center">
            <audio id="audioPlayer" controls crossorigin="anonymous" class="w-full max-w-md h-8"></audio>
        </div>
        <div class="w-1/3"></div>
    </div>

    <script>
        let albums = [];
        const player = document.getElementById('audioPlayer');

        async function init() {
            try {
                const res = await fetch('/api/get-songs');
                albums = await res.json();
                showGrid();
            } catch (err) {
                console.error("Failed to load music", err);
            }
        }

        function showGrid() {
            const grid = document.getElementById('album-grid');
            grid.innerHTML = '';
            document.getElementById('track-list').classList.add('hidden');
            document.getElementById('back-btn').classList.add('hidden');
            grid.classList.remove('hidden');

            albums.forEach((a, i) => {
                const div = document.createElement('div');
                div.className = 'album-card';
                div.innerHTML = `
                    <img src="${a.coverArt || 'https://via.placeholder.com/300?text=No+Cover'}" 
                         referrerpolicy="no-referrer" 
                         class="cover-img shadow-lg">
                    <div class="font-bold truncate text-zinc-100">${a.albumName}</div>
                    <div class="text-xs text-zinc-400 truncate">${a.artistName}</div>
                `;
                div.onclick = () => showTracks(i);
                grid.appendChild(div);
            });
        }

        function showTracks(i) {
    const album = albums[i];
    const list = document.getElementById('track-list');
    
    document.getElementById('album-grid').classList.add('hidden');
    list.classList.remove('hidden');
    document.getElementById('back-btn').classList.remove('hidden');

    // Updated Header with Transparent Edit Button in Top Right
    list.innerHTML = `
        <div class="relative group mb-8 flex flex-col md:flex-row items-end gap-6 p-4">
            
            <button onclick="changeCover(${i})" 
                class="absolute top-2 right-2 p-2 rounded-full bg-white/0 hover:bg-white/10 text-white/0 group-hover:text-white/40 transition-all duration-300 text-xs">
                <i class="fas fa-camera"></i>
            </button>

            <img src="${album.coverArt}" referrerpolicy="no-referrer" class="w-48 h-48 shadow-2xl rounded">
            
            <div class="flex-1">
                <p class="text-sm font-bold uppercase tracking-wider opacity-60">Album</p>
                <h2 class="text-6xl font-black mb-2">${album.albumName}</h2>
                <p class="text-lg opacity-70">${album.artistName} • ${album.songs.length} songs</p>
            </div>
        </div>
        <div id="songs-container" class="space-y-1"></div>
    `;

    const container = document.getElementById('songs-container');
    album.songs.forEach(s => {
        const row = document.createElement('div');
        row.className = 'track-row p-3 cursor-pointer rounded flex justify-between text-zinc-300 group hover:bg-white/5';
        row.innerHTML = `
            <div class="flex items-center gap-4">
                <i class="fas fa-play text-xs opacity-0 group-hover:opacity-100 text-green-500"></i>
                <span>${s.name.replace('.mp3', '')}</span>
            </div>
        `;
        row.onclick = () => {
            player.src = s.link;
            player.play();
            document.getElementById('now-playing').innerText = s.name.replace('.mp3', '');
            document.getElementById('now-artist').innerText = album.artistName;
        };
        container.appendChild(row);
    });
}

        init();
    </script>
</body>
</html>
