<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Cloud Collection - Recovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: 'Circular', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .app-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 300px; background: #000; padding: 20px; overflow-y: auto; border-right: 1px solid #282828; }
        .main-view { flex: 1; background: linear-gradient(to bottom, #121212, #000); overflow-y: auto; padding: 32px; }
        .track-grid { display: grid; grid-template-columns: 50px 4fr 3fr 2fr 80px; gap: 16px; padding: 8px 16px; align-items: center; border-radius: 4px; color: #b3b3b3; font-size: 14px; }
        .track-grid:hover:not(.header) { background: rgba(255,255,255,0.1); color: white; cursor: pointer; }
        .player-bar { height: 90px; background: #000; border-top: 1px solid #282828; display: grid; grid-template-columns: 30% 40% 30%; align-items: center; padding: 0 16px; }
        .shuffle-on { color: #1db954 !important; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="mb-8">
            <h3 class="text-xs uppercase tracking-widest font-bold text-zinc-500 mb-4">Your Library</h3>
            <div id="playlist-anchor" class="space-y-3">
                <div class="flex items-center gap-3 opacity-80 hover:opacity-100 cursor-pointer">
                    <div class="w-10 h-10 bg-zinc-800 flex items-center justify-center rounded"><i class="fas fa-music"></i></div>
                    <span class="font-bold text-sm">My Playlist #1</span>
                </div>
            </div>
        </div>
        <div>
            <h3 class="text-xs uppercase tracking-widest font-bold text-zinc-500 mb-4">Recently Listened</h3>
            <div id="history-anchor" class="space-y-4"></div>
        </div>
    </aside>

    <main class="main-view">
        <div id="grid-view">
            <h1 class="text-2xl font-black mb-6">Good evening</h1>
            <div id="album-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
        </div>

        <div id="album-view" class="hidden">
            <button onclick="backToGrid()" class="mb-6 text-zinc-400 hover:text-white font-bold text-sm"><i class="fas fa-chevron-left mr-2"></i> Back</button>
            <div id="album-header" class="flex items-end gap-6 mb-8"></div>
            <div class="track-grid header border-bottom border-zinc-800 text-[11px] uppercase tracking-wider mb-2">
                <span>#</span><span>Title</span><span>Album</span><span>Date Added</span><span><i class="far fa-clock"></i></span>
            </div>
            <div id="track-list-container"></div>
        </div>
    </main>
</div>

<div class="player-bar">
    <div class="flex items-center gap-4">
        <img id="dock-cover" src="" class="w-14 h-14 rounded hidden">
        <div>
            <div id="dock-title" class="font-bold text-sm text-white"></div>
            <div id="dock-artist" class="text-xs text-zinc-400"></div>
        </div>
    </div>
    <div class="flex flex-col items-center gap-2">
        <div class="flex items-center gap-6">
            <i id="shuffle-btn" class="fas fa-shuffle cursor-pointer hover:text-white text-zinc-500" onclick="toggleShuffle()"></i>
            <i class="fas fa-step-backward cursor-pointer hover:text-white"></i>
            <i id="play-btn" class="fas fa-play-circle text-3xl cursor-pointer hover:scale-105" onclick="togglePlay()"></i>
            <i class="fas fa-step-forward cursor-pointer hover:text-white" onclick="nextSong()"></i>
        </div>
        <div class="w-full flex items-center gap-2 text-[11px] text-zinc-400">
            <span id="time-cur">0:00</span>
            <input type="range" id="seek-bar" class="flex-1 accent-[#1db954]" value="0" oninput="seek()">
            <span id="time-total">0:00</span>
        </div>
    </div>
    <div class="flex justify-end">
        <input type="range" class="w-24 accent-[#1db954]" oninput="setVol(this.value)">
    </div>
</div>

<audio id="main-audio"></audio>

<script>
    let allData = [];
    let queue = [];
    let currentIndex = -1;
    let isShuffle = false;
    const audio = document.getElementById('main-audio');

    // INITIALIZE
    window.onload = async () => {
        loadHistory();
        try {
            const res = await fetch('/api/get-songs');
            allData = await res.json();
            if (allData.length > 0) renderGrid();
            else console.error("API returned empty array");
        } catch (e) {
            console.error("Critical API Failure", e);
        }
    };

    function renderGrid() {
        const grid = document.getElementById('album-grid');
        grid.innerHTML = allData.map((album, i) => `
            <div class="bg-[#181818] p-4 rounded-lg hover:bg-[#282828] transition group cursor-pointer" onclick="openAlbum(${i})">
                <img src="${album.coverArt}" class="w-full aspect-square object-cover rounded shadow-lg mb-4">
                <div class="font-bold truncate text-white">${album.albumName}</div>
                <div class="text-xs text-zinc-500">${album.artistName}</div>
            </div>
        `).join('');
    }

    function openAlbum(index) {
        const album = allData[index];
        queue = album.songs;
        document.getElementById('grid-view').classList.add('hidden');
        document.getElementById('album-view').classList.remove('hidden');
        
        document.getElementById('album-header').innerHTML = `
            <img src="${album.coverArt}" class="w-48 h-48 rounded shadow-2xl">
            <div>
                <h1 class="text-5xl font-black mb-2">${album.albumName}</h1>
                <p class="font-bold text-zinc-400">${album.artistName} • ${album.songs.length} songs</p>
            </div>
        `;

        document.getElementById('track-list-container').innerHTML = album.songs.map((song, i) => `
            <div class="track-grid" onclick="playSong(${i}, '${album.albumName}', '${album.artistName}', '${album.coverArt}')">
                <span>${i + 1}</span>
                <div class="flex flex-col">
                    <span class="text-white font-medium">${song.name.replace('.mp3', '')}</span>
                    <span class="text-xs text-zinc-500">${album.artistName}</span>
                </div>
                <span>${album.albumName}</span>
                <span>Dec 25, 2025</span>
                <span>3:45</span>
            </div>
        `).join('');
    }

    function playSong(index, albumName, artistName, cover) {
        currentIndex = index;
        const song = queue[currentIndex];
        
        audio.src = song.link;
        audio.play().catch(e => console.error("Playback failed. Check the song link:", song.link));

        // Update Dock
        document.getElementById('dock-cover').src = cover;
        document.getElementById('dock-cover').classList.remove('hidden');
        document.getElementById('dock-title').innerText = song.name.replace('.mp3', '');
        document.getElementById('dock-artist').innerText = artistName;
        document.getElementById('play-btn').className = "fas fa-pause-circle text-3xl cursor-pointer";

        saveToHistory(albumName, artistName, cover);
    }

    function togglePlay() {
        if (audio.paused) {
            audio.play();
            document.getElementById('play-btn').className = "fas fa-pause-circle text-3xl cursor-pointer";
        } else {
            audio.pause();
            document.getElementById('play-btn').className = "fas fa-play-circle text-3xl cursor-pointer";
        }
    }

    function toggleShuffle() {
        isShuffle = !isShuffle;
        document.getElementById('shuffle-btn').classList.toggle('shuffle-on', isShuffle);
    }

    function nextSong() {
        if (isShuffle) currentIndex = Math.floor(Math.random() * queue.length);
        else currentIndex = (currentIndex + 1) % queue.length;
        // Trigger play logic with existing album metadata
        const activeAlbum = allData.find(a => a.songs.includes(queue[0]));
        playSong(currentIndex, activeAlbum.albumName, activeAlbum.artistName, activeAlbum.coverArt);
    }

    function saveToHistory(album, artist, cover) {
        let history = JSON.parse(localStorage.getItem('recentHistory') || '[]');
        history = history.filter(h => h.album !== album);
        history.unshift({ album, artist, cover });
        localStorage.setItem('recentHistory', JSON.stringify(history.slice(0, 8)));
        loadHistory();
    }

    function loadHistory() {
        const history = JSON.parse(localStorage.getItem('recentHistory') || '[]');
        document.getElementById('history-anchor').innerHTML = history.map(h => `
            <div class="flex items-center gap-3 cursor-pointer group">
                <img src="${h.cover}" class="w-12 h-12 rounded object-cover shadow">
                <div class="truncate">
                    <div class="text-sm font-bold text-white group-hover:underline truncate">${h.album}</div>
                    <div class="text-[11px] text-zinc-500">${h.artist}</div>
                </div>
            </div>
        `).join('');
    }

    function backToGrid() {
        document.getElementById('grid-view').classList.remove('hidden');
        document.getElementById('album-view').classList.add('hidden');
    }

    function setVol(v) { audio.volume = v / 100; }
    function seek() { audio.currentTime = (document.getElementById('seek-bar').value / 100) * audio.duration; }
    
    audio.ontimeupdate = () => {
        const prog = (audio.currentTime / audio.duration) * 100;
        document.getElementById('seek-bar').value = prog || 0;
        document.getElementById('time-cur').innerText = formatTime(audio.currentTime);
        document.getElementById('time-total').innerText = formatTime(audio.duration || 0);
    };

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return `${m}:${sec < 10 ? '0' + sec : sec}`;
    }
</script>
</body>
</html>
