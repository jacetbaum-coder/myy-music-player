<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Cloud Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 3-Column Layout */
        .app-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebars - Hidden on Mobile (Pic 2 style) */
        .sidebar { width: 300px; background: #000; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        @media (max-width: 1024px) { .sidebar { display: none; } }

        .main-view { 
            flex: 1; 
            background: linear-gradient(to bottom, #1a1a1a, #000); 
            overflow-y: auto; 
            padding: 20px md:padding: 40px; 
        }

        .album-card { background: #181818; padding: 16px; border-radius: 8px; transition: 0.3s; cursor: pointer; }
        .album-card:hover { background: #282828; }
        .player-bar { height: 90px; background: #000; display: flex; align-items: center; padding: 0 20px; border-top: 1px solid #282828; z-index: 100; }
        .cover-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 4px; margin-bottom: 12px; background: #282828; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar border-right border-zinc-800">
            <h3 class="font-bold text-zinc-400 mb-4 uppercase text-xs tracking-widest">Recently Listened</h3>
            <div id="recent-list" class="space-y-4">
                <p class="text-zinc-600 text-sm">Your history will appear here...</p>
            </div>
        </aside>

        <main id="content-area" class="main-view">
            <button id="back-btn" onclick="showGrid()" class="hidden mb-6 opacity-70 hover:opacity-100 font-bold">
                <i class="fas fa-chevron-left"></i> Back
            </button>
            <div id="album-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
            <div id="track-list" class="hidden">
                <div id="album-header-container"></div>
                <div id="songs-container" class="space-y-1"></div>
            </div>
        </main>

        <aside class="sidebar border-l border-zinc-800">
            <h3 class="font-bold text-zinc-400 mb-4 uppercase text-xs tracking-widest">Now Playing</h3>
            <div id="artist-spotlight" class="text-center">
                <div class="w-full aspect-square bg-zinc-900 rounded-lg mb-4 flex items-center justify-center">
                    <i class="fas fa-music text-zinc-800 text-4xl"></i>
                </div>
                <h4 id="spotlight-album" class="font-bold text-lg">Select a track</h4>
                <p id="spotlight-artist" class="text-zinc-400 text-sm"></p>
            </div>
        </aside>
    </div>

    <div class="player-bar">
        <div class="w-1/3 flex items-center gap-4">
            <div id="mini-cover" class="w-12 h-12 bg-zinc-800 rounded hidden md:block"></div>
            <div>
                <div id="now-playing" class="font-bold text-sm text-zinc-100">Nothing Playing</div>
                <div id="now-artist" class="text-xs text-zinc-400"></div>
            </div>
        </div>
        <div class="w-1/3 flex justify-center">
            <audio id="audioPlayer" controls crossorigin="anonymous" class="w-full max-w-md h-8"></audio>
        </div>
        <div class="w-1/3"></div>
    </div>

    <script>
        let albums = [];
        let recentHistory = [];
        const player = document.getElementById('audioPlayer');

        async function init() {
            try {
                const res = await fetch('/api/get-songs');
                albums = await res.json();
                showGrid();
            } catch (err) { console.error(err); }
        }

        function showGrid() {
            const grid = document.getElementById('album-grid');
            grid.innerHTML = '';
            document.getElementById('track-list').classList.add('hidden');
            document.getElementById('back-btn').classList.add('hidden');
            grid.classList.remove('hidden');

            albums.forEach((a, i) => {
                const div = document.createElement('div');
                div.className = 'album-card';
                div.innerHTML = `
                    <img src="${a.coverArt}" referrerpolicy="no-referrer" class="cover-img shadow-lg">
                    <div class="font-bold truncate text-zinc-100 text-sm">${a.albumName}</div>
                    <div class="text-xs text-zinc-400 truncate">${a.artistName}</div>
                `;
                div.onclick = () => showTracks(i);
                grid.appendChild(div);
            });
        }

        function showTracks(i) {
            const album = albums[i];
            const list = document.getElementById('track-list');
            const header = document.getElementById('album-header-container');
            const container = document.getElementById('songs-container');
            
            document.getElementById('album-grid').classList.add('hidden');
            list.classList.remove('hidden');
            document.getElementById('back-btn').classList.remove('hidden');

            header.innerHTML = `
                <div class="relative group/art flex flex-col md:flex-row items-end gap-6 mb-8 p-4">
                    <div class="relative w-48 h-48 shrink-0">
                        <img src="${album.coverArt}" class="w-full h-full object-cover rounded shadow-2xl">
                        <button onclick="changeCover(${i})" class="absolute top-2 right-2 p-2 bg-black/60 rounded-full opacity-0 group-hover/art:opacity-100 transition">
                            <i class="fas fa-camera text-xs"></i>
                        </button>
                    </div>
                    <div>
                        <p class="text-xs font-bold uppercase opacity-60">Album</p>
                        <h2 class="text-4xl md:text-5xl font-black">${album.albumName}</h2>
                        <p class="opacity-70">${album.artistName} • ${album.songs.length} songs</p>
                    </div>
                </div>
            `;

            container.innerHTML = '';
            album.songs.forEach((s, idx) => {
                // Clean Artist Name from Title
                let cleanTitle = s.name.replace('.mp3', '');
                const artistRegex = new RegExp(`^${album.artistName}\\s*-\\s*`, 'i');
                cleanTitle = cleanTitle.replace(artistRegex, '');

                const row = document.createElement('div');
                row.className = 'track-row p-3 cursor-pointer rounded flex items-center gap-4 group/track';
                row.innerHTML = `
                    <span class="w-4 text-zinc-500 text-xs group-hover/track:hidden">${idx + 1}</span>
                    <i class="fas fa-play text-[10px] text-green-500 hidden group-hover/track:block"></i>
                    <span class="text-sm font-medium">${cleanTitle}</span>
                `;
                row.onclick = () => playSong(s.link, cleanTitle, album.artistName, album.coverArt, album.albumName);
                container.appendChild(row);
            });
        }

        function playSong(link, title, artist, cover, albumName) {
            player.src = link;
            player.play();
            
            // Update Player Bar
            document.getElementById('now-playing').innerText = title;
            document.getElementById('now-artist').innerText = artist;
            const mini = document.getElementById('mini-cover');
            mini.style.backgroundImage = `url(${cover})`;
            mini.style.backgroundSize = 'cover';
            mini.classList.remove('hidden');

            // Update Right Sidebar (Spotlight)
            const spotlight = document.getElementById('artist-spotlight');
            spotlight.innerHTML = `
                <img src="${cover}" class="w-full aspect-square rounded-lg shadow-2xl mb-4 object-cover">
                <h4 class="font-bold text-lg">${albumName}</h4>
                <p class="text-zinc-400 text-sm mb-6">${artist}</p>
                <div class="bg-zinc-900 p-4 rounded-lg text-left">
                    <p class="text-xs font-bold text-zinc-500 uppercase mb-2">About the artist</p>
                    <p class="text-sm text-zinc-300">Streaming from your cloud collection.</p>
                </div>
            `;

            // Update Left Sidebar (History)
            updateHistory(albumName, artist, cover);
        }

        function updateHistory(album, artist, cover) {
            const historyItem = { album, artist, cover };
            recentHistory = [historyItem, ...recentHistory.filter(h => h.album !== album)].slice(0, 8);
            
            const recentContainer = document.getElementById('recent-list');
            recentContainer.innerHTML = recentHistory.map(h => `
                <div class="flex items-center gap-3 opacity-80 hover:opacity-100 cursor-default">
                    <img src="${h.cover}" class="w-10 h-10 rounded">
                    <div class="truncate">
                        <div class="text-sm font-bold truncate">${h.album}</div>
                        <div class="text-xs text-zinc-500 truncate">${h.artist}</div>
                    </div>
                </div>
            `).join('');
        }

        // Keep your existing changeCover and saveToDatabase functions here...
        async function changeCover(index) {
            const choice = confirm("OK for Upload, Cancel for Link");
            if (choice) {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = e => {
                    const reader = new FileReader();
                    reader.onload = ev => saveToDatabase(index, ev.target.result);
                    reader.readAsDataURL(e.target.files[0]);
                };
                input.click();
            } else {
                const url = prompt("Paste URL:");
                if (url) saveToDatabase(index, url);
            }
        }

        async function saveToDatabase(idx, url) {
            const a = albums[idx];
            const key = `cover-${a.artistName}-${a.albumName}`.replace(/\s+/g, '-').toLowerCase();
            await fetch('/api/get-songs', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ key, url })
            });
            a.coverArt = url;
            showTracks(idx);
        }

        init();
    </script>
</body>
</html>
