<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Cloud Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .main-view { background: linear-gradient(to bottom, #1a1a1a, #000); flex: 1; overflow-y: auto; padding: 40px; }
        .album-card { background: #181818; padding: 16px; border-radius: 8px; transition: 0.3s; cursor: pointer; }
        .album-card:hover { background: #282828; }
        .player-bar { height: 90px; background: #000; display: flex; align-items: center; padding: 0 20px; border-top: 1px solid #282828; }
        .track-row:hover { background: rgba(255,255,255,0.1); }
        .hidden { display: none; }
        .cover-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 4px; margin-bottom: 12px; background: #282828; }
    </style>
</head>
<body>
    <div id="content-area" class="main-view">
        <button id="back-btn" onclick="showGrid()" class="hidden mb-6 opacity-70 hover:opacity-100 font-bold">
            <i class="fas fa-chevron-left"></i> Back
        </button>
        <div id="album-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
        <div id="track-list" class="hidden">
            <div id="album-header-container"></div>
            <div id="songs-container" class="space-y-1 px-4"></div>
        </div>
    </div>

    <div class="player-bar">
        <div class="w-1/3 flex flex-col justify-center">
            <div id="now-playing" class="font-bold text-sm text-zinc-100">Nothing Playing</div>
            <div id="now-artist" class="text-xs text-zinc-400"></div>
        </div>
        <div class="w-1/3 flex justify-center">
            <audio id="audioPlayer" controls crossorigin="anonymous" class="w-full max-w-md h-8"></audio>
        </div>
        <div class="w-1/3"></div>
    </div>

    <script>
        let albums = [];
        const player = document.getElementById('audioPlayer');

        async function init() {
            try {
                const res = await fetch('/api/get-songs');
                albums = await res.json();
                showGrid();
            } catch (err) {
                console.error("Failed to load music", err);
            }
        }

        function showGrid() {
            const grid = document.getElementById('album-grid');
            grid.innerHTML = '';
            document.getElementById('track-list').classList.add('hidden');
            document.getElementById('back-btn').classList.add('hidden');
            grid.classList.remove('hidden');

            albums.forEach((a, i) => {
                const div = document.createElement('div');
                div.className = 'album-card';
                div.innerHTML = `
                    <img src="${a.coverArt || 'https://via.placeholder.com/300?text=No+Cover'}" 
                         referrerpolicy="no-referrer" 
                         class="cover-img shadow-lg">
                    <div class="font-bold truncate text-zinc-100">${a.albumName}</div>
                    <div class="text-xs text-zinc-400 truncate">${a.artistName}</div>
                `;
                div.onclick = () => showTracks(i);
                grid.appendChild(div);
            });
        }

        async function changeCover(index) {
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'image/*';

            const choice = confirm("Press OK to Upload a file, or Cancel to paste a Link.");

            if (choice) {
                fileInput.onchange = async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    if (file.size > 800000) {
                        alert("File too big! Please keep it under 800KB.");
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = async (event) => {
                        await saveToDatabase(index, event.target.result);
                    };
                    reader.readAsDataURL(file);
                };
                fileInput.click();
            } else {
                const newUrl = prompt("Paste image URL:");
                if (newUrl && newUrl.startsWith('http')) {
                    await saveToDatabase(index, newUrl);
                }
            }
        }

        async function saveToDatabase(index, finalUrl) {
            const a = albums[index];
            const storageKey = `cover-${a.artistName}-${a.albumName}`.replace(/\s+/g, '-').toLowerCase();
            try {
                const response = await fetch('/api/get-songs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key: storageKey, url: finalUrl })
                });
                if (response.ok) {
                    a.coverArt = finalUrl;
                    showTracks(index);
                }
            } catch (err) { console.error(err); }
        }

        function showTracks(i) {
    const album = albums[i];
    const list = document.getElementById('track-list');
    const header = document.getElementById('album-header-container');
    const container = document.getElementById('songs-container');
    
    document.getElementById('album-grid').classList.add('hidden');
    list.classList.remove('hidden');
    document.getElementById('back-btn').classList.remove('hidden');

    // Header with the camera icon placed on the top-right of the ART itself
    header.innerHTML = `
        <div class="mb-8 flex flex-col md:flex-row items-end gap-6 p-4">
            <div class="relative group/art w-48 h-48 shrink-0">
                <img src="${album.coverArt}" referrerpolicy="no-referrer" class="w-full h-full shadow-2xl rounded-lg object-cover">
                <button onclick="changeCover(${i})" 
                    class="absolute top-2 right-2 z-50 p-2 rounded-full bg-black/60 text-white opacity-0 group-hover/art:opacity-100 transition-opacity backdrop-blur-sm">
                    <i class="fas fa-camera text-xs"></i>
                </button>
            </div>
            <div class="flex-1">
                <p class="text-sm font-bold uppercase tracking-wider opacity-60">Album</p>
                <h2 class="text-4xl md:text-6xl font-black mb-2 leading-tight">${album.albumName}</h2>
                <p class="text-lg opacity-70">${album.artistName} • ${album.songs.length} songs</p>
            </div>
        </div>
    `;

    container.innerHTML = '';
    
    // Track List with cleaner titles and numbers
    album.songs.forEach((s, index) => {
        const row = document.createElement('div');
        row.className = 'track-row p-3 cursor-pointer rounded-md flex items-center justify-between text-zinc-300 group/song hover:bg-white/10 transition-all';
        
        // Logic to remove "Artist Name - " from the song title
        // It looks for the artist name followed by a dash or space
        let cleanTitle = s.name.replace('.mp3', '');
        const artistPrefix = new RegExp(`^${album.artistName}\\s*-\\s*`, 'i');
        cleanTitle = cleanTitle.replace(artistPrefix, '');

        row.innerHTML = `
            <div class="flex items-center gap-4">
                <span class="w-6 text-right text-zinc-500 group-hover/song:hidden text-sm font-medium">
                    ${index + 1}
                </span>
                <i class="fas fa-play text-[10px] hidden group-hover/song:inline-block text-green-500 w-6 text-center"></i>
                
                <span class="font-medium">${cleanTitle}</span>
            </div>
        `;

        row.onclick = () => {
            player.src = s.link;
            player.play();
            document.getElementById('now-playing').innerText = cleanTitle;
            document.getElementById('now-artist').innerText = album.artistName;
        };
        container.appendChild(row);
    });
}

        init();
    </script>
</body>
</html>
