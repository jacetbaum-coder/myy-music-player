<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Cloud Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .main-view { background: linear-gradient(to bottom, #1a1a1a, #000); flex: 1; overflow-y: auto; padding: 40px; }
        .album-card { background: #181818; padding: 16px; border-radius: 8px; transition: 0.3s; cursor: pointer; }
        .album-card:hover { background: #282828; }
        .player-bar { height: 90px; background: #000; display: flex; align-items: center; padding: 0 20px; border-top: 1px solid #282828; }
        .track-row:hover { background: rgba(255,255,255,0.1); }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="content-area" class="main-view">
        <button id="back-btn" onclick="showGrid()" class="hidden mb-6 opacity-70 hover:opacity-100 font-bold">
            <i class="fas fa-chevron-left"></i> Back
        </button>
        <div id="album-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
        <div id="track-list" class="hidden">
            <h2 id="list-title" class="text-4xl font-bold mb-4"></h2>
            <div id="songs-container" class="space-y-1"></div>
        </div>
    </div>

    <div class="player-bar">
        <div class="w-1/3 flex flex-col justify-center">
            <div id="now-playing" class="font-bold text-sm">Nothing Playing</div>
            <div id="now-artist" class="text-xs opacity-60"></div>
        </div>
        <audio id="audioPlayer" controls crossorigin="anonymous" class="w-full max-w-md h-8"></audio>
    </div>

    <script>
        let albums = [];
        const player = document.getElementById('audioPlayer');

        async function init() {
            const res = await fetch('/api/get-songs');
            albums = await res.json();
            showGrid();
        }

        function showGrid() {
            const grid = document.getElementById('album-grid');
            grid.innerHTML = '';
            document.getElementById('track-list').classList.add('hidden');
            document.getElementById('back-btn').classList.add('hidden');
            grid.classList.remove('hidden');

            albums.forEach((a, i) => {
                const div = document.createElement('div');
                div.className = 'album-card';
                div.innerHTML = `<div class="font-bold">${a.albumName}</div><div class="text-xs opacity-50">${a.artistName}</div>`;
                div.onclick = () => showTracks(i);
                grid.appendChild(div);
            });
        }

        function showTracks(i) {
            const album = albums[i];
            document.getElementById('album-grid').classList.add('hidden');
            document.getElementById('track-list').classList.remove('hidden');
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('list-title').innerText = album.albumName;

            const container = document.getElementById('songs-container');
            container.innerHTML = '';
            album.songs.forEach(s => {
                const row = document.createElement('div');
                row.className = 'track-row p-3 cursor-pointer rounded';
                row.innerText = s.name.replace('.mp3', '');
                row.onclick = () => {
                    player.src = s.link;
                    player.play();
                    document.getElementById('now-playing').innerText = s.name.replace('.mp3', '');
                    document.getElementById('now-artist').innerText = album.artistName;
                };
                container.appendChild(row);
            });
        }

        init();
    </script>
</body>
</html>
