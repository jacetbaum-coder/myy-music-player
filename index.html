<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Cloud Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .app-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebars with transition for hiding */
        .sidebar { width: 300px; background: #000; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; transition: transform 0.6s ease, opacity 0.6s ease, width 0.6s ease; }
        @media (max-width: 1024px) { .sidebar { display: none; } }

        /* Auto-Hide Classes */
        .sidebar-hidden { width: 0; padding: 0; opacity: 0; pointer-events: none; transform: translateX(50px); }
        .dock-hidden { transform: translateY(100%); opacity: 0; }

        .main-view { flex: 1; background: linear-gradient(to bottom, #1a1a1a, #000); overflow-y: auto; padding: 20px; }

        /* Context Menu */
        #context-menu { position: fixed; display: none; background: #282828; border-radius: 4px; padding: 4px; min-width: 180px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); z-index: 1000; }
        .menu-item { padding: 12px 16px; cursor: pointer; font-size: 14px; border-radius: 2px; display: flex; justify-content: space-between; align-items: center; }
        .menu-item:hover { background: #3e3e3e; }

        .album-card { background: #181818; padding: 16px; border-radius: 8px; transition: 0.3s; cursor: pointer; }
        .album-card:hover { background: #282828; }
        
        .player-bar { height: 90px; background: #000; display: flex; align-items: center; padding: 0 20px; border-top: 1px solid #282828; z-index: 100; transition: transform 0.6s ease, opacity 0.6s ease; }
        .cover-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 4px; margin-bottom: 12px; background: #282828; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body onclick="hideMenu()">

    <div class="app-container">
        <aside class="sidebar border-r border-zinc-800">
            <div class="mb-8">
                <h3 class="font-bold text-zinc-400 mb-4 uppercase text-[10px] tracking-widest flex justify-between items-center">
                    Your Library
                    <i class="fas fa-plus cursor-pointer hover:text-white" onclick="createNewPlaylist()"></i>
                </h3>
                <div id="playlist-list" class="space-y-2"></div>
            </div>
            
            <h3 class="font-bold text-zinc-400 mb-4 uppercase text-[10px] tracking-widest">Recently Listened</h3>
            <div id="recent-list" class="space-y-4"></div>
        </aside>

        <main id="content-area" class="main-view">
            <button id="back-btn" onclick="showGrid()" class="hidden mb-6 opacity-70 hover:opacity-100 font-bold">
                <i class="fas fa-chevron-left"></i> Back
            </button>
            <div id="album-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
            <div id="track-list" class="hidden">
                <div id="album-header-container"></div>
                <div id="songs-container" class="space-y-1"></div>
            </div>
        </main>

        <aside id="right-sidebar" class="sidebar border-l border-zinc-800">
            <h3 class="font-bold text-zinc-400 mb-4 uppercase text-[10px] tracking-widest">Now Playing</h3>
            <div id="artist-spotlight" class="text-center">
                <div class="w-full aspect-square bg-zinc-900 rounded-lg mb-4 flex items-center justify-center">
                    <i class="fas fa-music text-zinc-800 text-4xl"></i>
                </div>
            </div>
        </aside>
    </div>

    <div id="context-menu">
        <div class="menu-item border-b border-white/5 pb-2" onclick="createNewPlaylist()">New Playlist <i class="fas fa-plus text-[10px]"></i></div>
        <div id="add-to-options" class="pt-2"></div>
    </div>

    <div id="playlist-modal" class="fixed inset-0 z-[2000] hidden flex items-center justify-center bg-black/80 backdrop-blur-md">
        <div class="bg-[#282828] p-8 rounded-lg shadow-2xl w-full max-w-md border border-white/10">
            <h2 class="text-2xl font-black mb-6">Edit details</h2>
            <div class="flex gap-4">
                <div class="w-40 h-40 bg-zinc-800 rounded flex items-center justify-center shadow-lg shrink-0">
                    <i class="fas fa-music text-4xl text-zinc-600"></i>
                </div>
                <div class="flex-1 flex flex-col justify-end">
                    <label class="text-[10px] font-bold uppercase tracking-wider text-zinc-400 mb-1">Name</label>
                    <input type="text" id="modal-input" placeholder="My Playlist #1" 
                        class="bg-[#3e3e3e] border-none text-white p-3 rounded-md focus:ring-2 focus:ring-green-500 outline-none mb-4 w-full">
                    <button onclick="confirmPlaylist()" class="self-end bg-white text-black px-8 py-3 rounded-full font-bold hover:scale-105 transition active:scale-95">
                        Save
                    </button>
                </div>
            </div>
            <button onclick="closeModal()" class="mt-4 text-sm text-zinc-400 hover:text-white transition w-full text-center">Cancel</button>
        </div>
    </div>

    <div id="player-dock" class="player-bar">
        <div class="w-1/3 flex items-center gap-4">
            <div id="mini-cover" class="w-12 h-12 bg-zinc-800 rounded hidden md:block"></div>
            <div class="truncate">
                <div id="now-playing" class="font-bold text-sm text-zinc-100 truncate">Nothing Playing</div>
                <div id="now-artist" class="text-xs text-zinc-400 truncate"></div>
            </div>
        </div>
        <div class="w-1/3 flex justify-center">
            <audio id="audioPlayer" controls crossorigin="anonymous" class="w-full max-w-md h-8"></audio>
        </div>
        <div class="w-1/3"></div>
    </div>

    <script>
let albums = [];
        // READ Playlists from the browser memory
        let playlists = JSON.parse(localStorage.getItem('userPlaylists')) || {};
        
        // READ History from the browser memory
        let recentHistory = JSON.parse(localStorage.getItem('recentHistory')) || [];

        window.addEventListener('DOMContentLoaded', () => {
            if (recentHistory.length > 0) renderHistory();
            renderPlaylists(); // This line makes them appear on screen immediately
        });
        let selectedSongForMenu = null;
        let inactivityTimer;
        const ONE_HOUR = 60 * 60 * 1000;
        const player = document.getElementById('audioPlayer');

       async function init() {
            try {
                const res = await fetch('/api/get-songs');
                const data = await res.json();
                
                // Load the songs for the grid
                albums = data.albums || (Array.isArray(data) ? data : []);
                
                // ONLY use server data if it actually exists, 
                // otherwise keep what we loaded from localStorage
                if (data.appState) {
                    if (data.appState.playlists && Object.keys(data.appState.playlists).length > 0) {
                        playlists = data.appState.playlists;
                    }
                    if (data.appState.recentHistory && data.appState.recentHistory.length > 0) {
                        recentHistory = data.appState.recentHistory;
                    }
                    if (data.appState.lastPlayed) {
                        restoreLastPlayed(data.appState.lastPlayed);
                    }
                }

                // Force a redraw of the UI with our saved data
                renderPlaylists();
                renderHistory();
                showGrid();
                resetInactivityTimer();
            } catch (err) { console.error(err); }
        }

        // --- PERSISTENCE HELPERS ---
        async function saveGlobalState() {
            const lastPlayed = {
                link: player.src,
                title: document.getElementById('now-playing').innerText,
                artist: document.getElementById('now-artist').innerText,
                cover: document.getElementById('mini-cover').style.backgroundImage.slice(5, -2),
                albumName: document.querySelector('#artist-spotlight h4')?.innerText || ""
            };

            await fetch('/api/get-songs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    key: 'app-state', 
                    data: { playlists, recentHistory, lastPlayed } 
                })
            });
        }

        function restoreLastPlayed(lp) {
            if (!lp.link) return;
            player.src = lp.link;
            updateNowPlayingUI(lp.title, lp.artist, lp.cover, lp.albumName);
        }

        // --- UI UPDATES ---
        function updateNowPlayingUI(title, artist, cover, albumName) {
            document.getElementById('now-playing').innerText = title;
            document.getElementById('now-artist').innerText = artist;
            const mini = document.getElementById('mini-cover');
            mini.style.backgroundImage = `url(${cover})`;
            mini.style.backgroundSize = 'cover';
            mini.classList.remove('hidden');

            document.getElementById('artist-spotlight').innerHTML = `
                <img src="${cover}" class="w-full aspect-square rounded-lg shadow-2xl mb-4 object-cover">
                <h4 class="font-bold text-lg">${albumName}</h4>
                <p class="text-zinc-400 text-sm">${artist}</p>
            `;
            
            // Show hidden elements if they were gone
            document.getElementById('right-sidebar').classList.remove('sidebar-hidden');
            document.getElementById('player-dock').classList.remove('dock-hidden');
        }

        // --- AUTO-HIDE LOGIC ---
        function resetInactivityTimer() {
            clearTimeout(inactivityTimer);
            if (player.paused || !player.src) {
                inactivityTimer = setTimeout(() => {
                    document.getElementById('right-sidebar').classList.add('sidebar-hidden');
                    document.getElementById('player-dock').classList.add('dock-hidden');
                }, ONE_HOUR);
            }
        }

        player.onplay = () => {
            clearTimeout(inactivityTimer);
            document.getElementById('right-sidebar').classList.remove('sidebar-hidden');
            document.getElementById('player-dock').classList.remove('dock-hidden');
        };
        player.onpause = () => resetInactivityTimer();

        // --- PLAYLIST MODAL ---
        function createNewPlaylist() {
            hideMenu();
            const modal = document.getElementById('playlist-modal');
            const input = document.getElementById('modal-input');
            modal.classList.remove('hidden');
            input.focus();
            input.value = `My Playlist #${Object.keys(playlists).length + 1}`;
            input.onkeydown = (e) => { if (e.key === 'Enter') confirmPlaylist(); };
        }

        function closeModal() { document.getElementById('playlist-modal').classList.add('hidden'); }

  async function confirmPlaylist() {
            const name = document.getElementById('modal-input').value.trim();
            if (name && !playlists[name]) {
                playlists[name] = selectedSongForMenu ? [selectedSongForMenu] : [];
                renderPlaylists();
                closeModal();

                // ADD THIS LINE BELOW:
                localStorage.setItem('userPlaylists', JSON.stringify(playlists));
                
                await saveGlobalState();
            }
        }

function renderPlaylists() {
            const container = document.getElementById('playlist-list');
            container.innerHTML = '';

            Object.keys(playlists).forEach(pName => {
                const songs = playlists[pName];
                let coverHTML = '';

                // Logic for Dynamic Covers
                if (songs.length >= 4) {
                    // 4-way grid for 4+ songs
                    coverHTML = `
                        <div class="grid grid-cols-2 w-10 h-10 rounded overflow-hidden mr-3">
                            <img src="${songs[0].cover}" class="w-full h-full object-cover">
                            <img src="${songs[1].cover}" class="w-full h-full object-cover">
                            <img src="${songs[2].cover}" class="w-full h-full object-cover">
                            <img src="${songs[3].cover}" class="w-full h-full object-cover">
                        </div>`;
                } else if (songs.length > 0) {
                    // Single cover if 1-3 songs
                    coverHTML = `<img src="${songs[0].cover}" class="w-10 h-10 rounded mr-3 object-cover">`;
                } else {
                    // Default icon if empty
                    coverHTML = `
                        <div class="w-10 h-10 rounded bg-zinc-800 flex items-center justify-center mr-3">
                            <i class="fas fa-music text-zinc-500"></i>
                        </div>`;
                }

                const div = document.createElement('div');
                div.className = "flex items-center p-2 rounded hover:bg-zinc-800 cursor-pointer group";
                
                // This makes the playlist clickable!
                div.onclick = () => showPlaylist(pName);

                div.innerHTML = `
                    ${coverHTML}
                    <div class="truncate">
                        <div class="text-sm font-bold text-white">${pName}</div>
                        <div class="text-xs text-zinc-400">Playlist • ${songs.length} songs</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function showPlaylist(pName) {
            const songs = playlists[pName];
            const contentArea = document.getElementById('album-grid');
            const trackList = document.getElementById('track-list');
            const headerContainer = document.getElementById('album-header-container');
            const songsContainer = document.getElementById('songs-container');

            contentArea.classList.add('hidden');
            trackList.classList.remove('hidden');
            document.getElementById('back-btn').classList.remove('hidden');

            // Set the Header (Playlist Name and Count)
            headerContainer.innerHTML = `
                <div class="flex items-end gap-6 mb-8">
                    <div class="w-48 h-48 shadow-2xl bg-zinc-800 flex items-center justify-center">
                        <i class="fas fa-music text-4xl text-zinc-600"></i>
                    </div>
                    <div>
                        <p class="text-xs font-bold uppercase">Playlist</p>
                        <h1 class="text-5xl font-black mt-2 mb-4">${pName}</h1>
                        <p class="text-sm text-zinc-400">${songs.length} songs</p>
                    </div>
                </div>
            `;

            // List the songs
            songsContainer.innerHTML = '';
            songs.forEach((s, idx) => {
                const row = document.createElement('div');
                row.className = "track-row p-3 cursor-pointer rounded-md flex items-center gap-4 text-zinc-400 group hover:bg-white/10";
                row.onclick = () => playSong(s.link, s.name, s.artist, s.cover, pName);
                row.innerHTML = `
                    <span class="w-6 text-right text-zinc-500 text-sm font-medium">${idx + 1}</span>
                    <img src="${s.cover}" class="w-10 h-10 rounded">
                    <div class="flex-1">
                        <div class="text-white font-medium">${s.name}</div>
                        <div class="text-sm">${s.artistName}</div>
                    </div>
                `;
                songsContainer.appendChild(row);
            });
        }
        // --- CORE FUNCTIONALITY ---
        function showGrid() {
            const grid = document.getElementById('album-grid');
            grid.innerHTML = '';
            document.getElementById('track-list').classList.add('hidden');
            document.getElementById('back-btn').classList.add('hidden');
            grid.classList.remove('hidden');
            albums.forEach((a, i) => {
                const div = document.createElement('div');
                div.className = 'album-card';
                div.innerHTML = `<img src="${a.coverArt}" class="cover-img shadow-lg"><div class="font-bold truncate text-sm">${a.albumName}</div><div class="text-xs text-zinc-500 truncate">${a.artistName}</div>`;
                div.onclick = () => showTracks(i);
                grid.appendChild(div);
            });
        }

        function showTracks(i) {
            const album = albums[i];
            const list = document.getElementById('track-list');
            const header = document.getElementById('album-header-container');
            const container = document.getElementById('songs-container');
            document.getElementById('album-grid').classList.add('hidden');
            list.classList.remove('hidden');
            document.getElementById('back-btn').classList.remove('hidden');

            header.innerHTML = `<div class="mb-8 flex flex-col md:flex-row items-end gap-6 p-4">
                <img src="${album.coverArt}" class="w-48 h-48 shadow-2xl rounded-lg object-cover">
                <div><h2 class="text-4xl md:text-6xl font-black mb-2">${album.albumName}</h2><p class="text-lg opacity-70">${album.artistName}</p></div>
            </div>`;

            container.innerHTML = '';
            album.songs.forEach((s, idx) => {
                const row = document.createElement('div');
                row.className = 'track-row p-3 cursor-pointer rounded-md flex items-center gap-4 text-zinc-300 group hover:bg-white/10 transition-all';
                row.dataset.songInfo = JSON.stringify({...s, artist: album.artistName, cover: album.coverArt, albumName: album.albumName});
                row.innerHTML = `<span class="w-6 text-right text-zinc-500 text-sm">${idx + 1}</span><span class="font-medium flex-1">${s.name.replace('.mp3', '')}</span>`;
                row.onclick = () => playSong(s.link, s.name.replace('.mp3', ''), album.artistName, album.coverArt, album.albumName);
                container.appendChild(row);
            });
        }

        function playSong(link, title, artist, cover, albumName) {
            player.src = link;
            player.play();
            updateNowPlayingUI(title, artist, cover, albumName);
            recentHistory = [{ albumName, artist, cover }, ...recentHistory.filter(h => h.albumName !== albumName)].slice(0, 8);
            renderHistory();
            saveGlobalState();
            localStorage.setItem('recentHistory', JSON.stringify(recentHistory));
        }

        function renderHistory() {
            document.getElementById('recent-list').innerHTML = recentHistory.map(h => `
                <div class="flex items-center gap-3 opacity-80 hover:opacity-100 transition">
                    <img src="${h.cover}" class="w-10 h-10 rounded">
                    <div class="truncate"><div class="text-sm font-bold truncate">${h.albumName}</div><div class="text-xs text-zinc-500 truncate">${h.artist}</div></div>
                </div>`).join('');
        }

        // --- CONTEXT MENU ---
        window.oncontextmenu = function(e) {
            const trackRow = e.target.closest('.track-row');
            if (trackRow) {
                e.preventDefault();
                selectedSongForMenu = JSON.parse(trackRow.dataset.songInfo);
                const menu = document.getElementById('context-menu');
                menu.style.display = 'block';
                menu.style.left = e.pageX + 'px';
                menu.style.top = e.pageY + 'px';
                document.getElementById('add-to-options').innerHTML = Object.keys(playlists).map(p => `<div class="menu-item" onclick="addToPlaylist('${p}')">${p}</div>`).join('');
            }
        };

        async function addToPlaylist(pName) {
    if (!playlists[pName].some(s => s.link === selectedSongForMenu.link)) {
        playlists[pName].push(selectedSongForMenu);
        renderPlaylists(); // <--- ADD THIS so the song count and covers update immediately
        localStorage.setItem('userPlaylists', JSON.stringify(playlists));
        await saveGlobalState();
    }
    hideMenu();
}

        function hideMenu() { document.getElementById('context-menu').style.display = 'none'; }

        init();
    </script>
</body>
</html>
