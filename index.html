<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cloud Music Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dexie/3.2.4/dexie.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .sync-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1DB954; color: black; padding: 10px 20px; border-radius: 20px; font-weight: bold; z-index: 9999; display: none; }
        .sidebar { background-color: #121212; border-radius: 8px; margin: 8px; padding: 15px; }
        .main-content { background: linear-gradient(to bottom, #222, #121212); border-radius: 8px; margin: 8px 8px 8px 0; flex-grow: 1; overflow-y: auto; }
        .player-bar { background-color: #000; height: 90px; display: flex; align-items: center; padding: 0 16px; }
    </style>
</head>
<body>
    <div id="sync-status" class="sync-toast">Syncing your Google Drive...</div>
    <div class="flex flex-grow overflow-hidden">
        <div class="sidebar w-64 flex flex-col gap-4">
            <div class="bg-[#121212] rounded-lg p-4">
                <div class="flex items-center gap-4 mb-4 opacity-70 hover:opacity-100 cursor-pointer"><i class="fas fa-home text-xl"></i><span>Home</span></div>
            </div>
            <div class="bg-[#121212] rounded-lg p-4 flex-grow overflow-y-auto">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2 opacity-70"><i class="fas fa-list"></i><span>Your Library</span></div>
                    <button onclick="syncFromGoogleDrive()" class="hover:bg-[#282828] p-2 rounded-full"><i class="fas fa-sync"></i></button>
                </div>
                <div id="playlist-container" class="space-y-2"></div>
            </div>
        </div>
        <div class="main-content">
            <div class="p-6">
                <h1 class="text-3xl font-bold mb-6">Cloud Songs</h1>
                <div id="song-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
            </div>
        </div>
    </div>
    <div class="player-bar">
        <audio id="audioPlayer" controls class="w-full"></audio>
    </div>

    <script>
        async function syncFromGoogleDrive() {
            const toast = document.getElementById('sync-status');
            toast.style.display = 'block';
            try {
                const response = await fetch('/api/get-songs');
                const songs = await response.json();
                const grid = document.getElementById('song-grid');
                grid.innerHTML = '';
                songs.forEach(song => {
                    const card = document.createElement('div');
                    card.className = "bg-[#181818] p-4 rounded-lg hover:bg-[#282828] cursor-pointer transition";
                    card.innerHTML = `<p class='font-bold truncate'>${song.name}</p>`;
                    card.onclick = () => {
                        const player = document.getElementById('audioPlayer');
                        player.src = song.webContentLink;
                        player.play();
                    };
                    grid.appendChild(card);
                });
            } catch (err) {
                console.error("Sync failed", err);
            } finally {
                toast.style.display = 'none';
            }
        }
        window.onload = syncFromGoogleDrive;
    </script>
</body>
</html>
