<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Cloud Collection - Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar { width: 260px; min-width: 150px; max-width: 400px; background: #000; display: flex; flex-direction: column; padding: 24px 16px; flex-shrink: 0; }
        .right-sidebar { width: 280px; min-width: 200px; max-width: 450px; background: #000; display: flex; flex-direction: column; padding: 24px 16px; flex-shrink: 0; transition: transform 0.3s ease; }
        .main-view { flex: 1; background: linear-gradient(180deg, #222 0%, #000 100%); overflow-y: auto; padding: 32px; position: relative; }
        .resizer { width: 4px; cursor: col-resize; background: transparent; transition: background 0.2s; z-index: 10; }
        .resizer:hover { background: rgba(255,255,255,0.3); }
        .track-row { display: grid; grid-template-columns: 40px 4fr 3fr 2fr 60px; gap: 12px; padding: 10px; border-radius: 4px; align-items: center; color: #b3b3b3; font-size: 14px; user-select: none; }
        .track-row:hover { background: rgba(255,255,255,0.1); color: white; cursor: pointer; }
        .player-bar { height: 90px; background: #000; border-top: 1px solid #282828; display: grid; grid-template-columns: 30% 40% 30%; align-items: center; padding: 0 16px; z-index: 50; transition: transform 0.3s ease; }
        .hidden { display: none !important; }
        .dock-hidden { transform: translateY(100%); }
        .sidebar-hidden { display: none !important; }
        #context-menu { position: fixed; background: #282828; border-radius: 4px; padding: 4px; min-width: 220px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); z-index: 1000; display: none; }
        .menu-item { padding: 10px 12px; font-size: 14px; color: #eaeaea; cursor: pointer; border-radius: 2px; display: flex; justify-content: space-between; align-items: center; }
        .menu-item:hover { background: #3e3e3e; }
        .grid-cover { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; width: 100%; height: 100%; }
        .rename-input { background: transparent; border: 1px solid #1db954; color: white; font-size: 3.75rem; font-weight: 900; width: 100%; outline: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="context-menu"></div>

    <div class="flex flex-1 overflow-hidden">
        <aside id="left-sidebar" class="sidebar">
            <div class="space-y-5">
                <div onclick="showView('home')" class="flex items-center gap-4 text-zinc-400 hover:text-white cursor-pointer font-bold text-sm">
                    <i class="fas fa-home text-xl w-6"></i> Home
                </div>
            </div>

            <div class="mt-8 mb-4 flex items-center justify-between">
                <span class="text-xs font-bold text-zinc-400 uppercase tracking-widest">Your Library</span>
                <i class="fas fa-plus text-zinc-400 hover:text-white cursor-pointer" onclick="createNewPlaylist()"></i>
            </div>

            <div id="sidebar-playlists" class="flex-1 overflow-y-auto space-y-2">
                </div>

            <div id="history-container" class="pt-4 border-t border-zinc-800 mt-4">
                <span class="text-xs font-bold text-zinc-400 uppercase tracking-widest block mb-3">Recently Listened</span>
            </div>
        </aside>

        <div id="resizer-left" class="resizer hidden md:block"></div>

        <main class="main-view">
            <div id="loading" class="text-center mt-20">
                <i class="fas fa-spinner fa-spin text-4xl text-[#1db954]"></i>
            </div>

            <div id="grid-view" class="hidden">
                <h1 class="text-2xl font-black mb-6">Good evening</h1>
                <div id="album-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6"></div>
            </div>

            <div id="album-view" class="hidden">
                <button onclick="showView('home')" class="mb-6 bg-black/40 hover:bg-black/80 rounded-full w-8 h-8 flex items-center justify-center">
                    <i class="fas fa-chevron-left text-white"></i>
                </button>
                <div id="album-hero" class="flex items-end gap-6 mb-8"></div>
                <div id="track-list"></div>
            </div>
        </main>

        <div id="resizer-right" class="resizer hidden md:block"></div>

        <aside id="right-sidebar" class="right-sidebar hidden md:flex sidebar-hidden">
            <div class="flex justify-between items-center mb-6">
                <span class="font-bold text-sm">Now Playing</span>
            </div>
            <img id="right-cover" class="w-full aspect-square rounded-lg shadow-2xl mb-4 bg-zinc-800">
            <h2 id="right-title" class="text-xl font-bold truncate"></h2>
            <p id="right-artist" class="text-zinc-400 text-sm mb-6"></p>
        </aside>
    </div>

    <div id="main-dock" class="player-bar dock-hidden">
        <div class="flex items-center gap-4">
            <img id="p-cover" class="w-14 h-14 rounded shadow bg-zinc-800">
            <div class="overflow-hidden">
                <div id="p-title" class="font-bold text-sm text-white truncate"></div>
                <div id="p-artist" class="text-xs text-zinc-400 truncate"></div>
            </div>
        </div>
        <div class="flex flex-col items-center gap-2">
            <div class="flex items-center gap-6 text-zinc-400">
                <i class="fas fa-step-backward hover:text-white cursor-pointer"></i>
                <div class="w-8 h-8 bg-white rounded-full flex items-center justify-center text-black" onclick="togglePlay()">
                    <i id="play-icon" class="fas fa-play ml-1"></i>
                </div>
                <i class="fas fa-step-forward hover:text-white cursor-pointer"></i>
            </div>
            <div class="w-full flex items-center gap-2 text-xs text-zinc-500">
                <span id="t-curr">0:00</span>
                <div class="h-1 bg-zinc-600 rounded-full flex-1 relative group cursor-pointer" id="progress-container">
                    <div id="progress-fill" class="h-full bg-white rounded-full w-0 group-hover:bg-[#1db954]"></div>
                </div>
                <span id="t-total">0:00</span>
            </div>
        </div>
        <div class="flex justify-end pr-4 gap-4 items-center">
            <i id="dock-heart" onclick="toggleLike()" class="far fa-heart hover:text-red-500 cursor-pointer text-lg"></i>
            <i class="fas fa-volume-up text-zinc-400 ml-2"></i>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        let libraryData = [];
        let currentSong = null;
        let menuTargetSong = null;
        let activePlaylistId = null;
        
        let playlists = JSON.parse(localStorage.getItem('userPlaylists')) || [
            { id: 'liked', name: 'Liked Songs', songs: [], type: 'system' },
            { id: 'p1', name: 'My Playlist #1', songs: [], type: 'custom' }
        ];
        let history = JSON.parse(localStorage.getItem('historyLog')) || [];
        let lastPlayedTime = localStorage.getItem('lastPlayedTime') || 0;
        
        const player = document.getElementById('audio-player');
        const dock = document.getElementById('main-dock');
        const contextMenu = document.getElementById('context-menu');

        window.onload = async () => {
            renderSidebar();
            renderHistory();
            checkDockVisibility();
            initResizers();
            
            window.addEventListener('keydown', (e) => { if (e.code === "Space") { e.preventDefault(); togglePlay(); } });
            document.addEventListener('click', () => { contextMenu.style.display = 'none'; });

            try {
                const response = await fetch('/api/get-songs');
                libraryData = await response.json();
                document.getElementById('loading').classList.add('hidden');
                showView('home');
            } catch (error) { console.error(error); }
        };

        function renderSidebar() {
            const container = document.getElementById('sidebar-playlists');
            container.innerHTML = playlists.map(p => `
                <div onclick="showPlaylist('${p.id}')" class="flex items-center gap-3 p-2 rounded hover:bg-zinc-900 cursor-pointer">
                    <div class="w-10 h-10 bg-zinc-800 rounded overflow-hidden flex items-center justify-center">
                        ${getCoverHtml(p, "text-xs")}
                    </div>
                    <div class="truncate">
                        <div class="text-sm font-bold text-white truncate">${p.name}</div>
                        <div class="text-xs text-zinc-400">${p.songs.length} songs</div>
                    </div>
                </div>
            `).join('');
        }

        function getCoverHtml(playlist, sizeClass = "") {
            if (playlist.songs.length === 0) return `<i class="fas ${playlist.id === 'liked' ? 'fa-heart' : 'fa-music'} text-zinc-500"></i>`;
            if (playlist.songs.length < 4) return `<img src="${playlist.songs[0].cover}" class="w-full h-full object-cover">`;
            return `<div class="grid-cover">
                ${playlist.songs.slice(0, 4).map(s => `<img src="${s.cover}" class="w-full h-full object-cover">`).join('')}
            </div>`;
        }

        function createNewPlaylist() {
            const newId = 'p' + Date.now();
            playlists.push({ id: newId, name: 'New Playlist', songs: [], type: 'custom' });
            save();
            renderSidebar();
            showPlaylist(newId);
        }

        function handleContextMenu(e, song, fromPlaylistId = null) {
            e.preventDefault();
            menuTargetSong = song;
            let menuHtml = `
                <div class="menu-item" onclick="toggleLikeTarget()">Add to Liked Songs <i class="far fa-heart"></i></div>
                <div class="border-t border-zinc-700 my-1"></div>
                <div class="text-[10px] text-zinc-500 px-3 uppercase py-1">Add to Playlist</div>
                ${playlists.filter(p => p.id !== 'liked').map(p => `
                    <div class="menu-item" onclick="addToSpecificPlaylist('${p.id}')">${p.name}</div>
                `).join('')}
                <div class="menu-item text-zinc-400" onclick="createNewPlaylist()">+ New Playlist</div>
            `;
            if (fromPlaylistId && fromPlaylistId !== 'liked') {
                menuHtml += `
                    <div class="border-t border-zinc-700 my-1"></div>
                    <div class="menu-item text-red-500" onclick="removeFromPlaylist('${fromPlaylistId}')">Remove from this playlist</div>
                `;
            }
            contextMenu.innerHTML = menuHtml;
            contextMenu.style.display = 'block';
            contextMenu.style.left = e.pageX + 'px';
            contextMenu.style.top = e.pageY + 'px';
        }

        function addToSpecificPlaylist(id) {
            const p = playlists.find(x => x.id === id);
            if (p && !p.songs.some(s => s.url === menuTargetSong.url)) {
                p.songs.push({...menuTargetSong});
                save();
                renderSidebar();
            }
        }

        function removeFromPlaylist(id) {
            const p = playlists.find(x => x.id === id);
            p.songs = p.songs.filter(s => s.url !== menuTargetSong.url);
            save();
            renderSidebar();
            showPlaylist(id);
        }

        function showPlaylist(id) {
            const p = playlists.find(x => x.id === id);
            activePlaylistId = id;
            document.getElementById('grid-view').classList.add('hidden');
            const view = document.getElementById('album-view');
            view.classList.remove('hidden');
            
            document.getElementById('album-hero').innerHTML = `
                <div class="w-52 h-52 bg-zinc-800 rounded shadow-2xl overflow-hidden">${getCoverHtml(p)}</div>
                <div>
                    <p class="text-xs font-bold uppercase">Playlist</p>
                    <h1 id="playlist-title" class="text-6xl font-black my-4 cursor-pointer hover:underline" onclick="enableRename('${p.id}')">${p.name}</h1>
                </div>`;
            
            const list = document.getElementById('track-list');
            list.innerHTML = p.songs.map((s, i) => `
                <div class="track-row group" onclick="playSong(null, '${s.url}', '${s.title}', '${p.name}', '${s.artist}', '${s.cover}')" oncontextmenu="handleContextMenu(event, {url:'${s.url}', title:'${s.title}', artist:'${s.artist}', cover:'${s.cover}'}, '${p.id}')">
                    <span class="text-zinc-400">${i+1}</span>
                    <div class="text-white font-medium">${s.title}</div>
                    <span class="truncate">${s.artist}</span>
                    <span>Recent</span>
                    <span>3:45</span>
                </div>
            `).join('');
        }

        function enableRename(id) {
            if (id === 'liked') return;
            const titleEl = document.getElementById('playlist-title');
            const currentName = titleEl.innerText;
            titleEl.innerHTML = `<input type="text" class="rename-input" value="${currentName}" onblur="finalizeRename('${id}', this.value)" onkeydown="if(event.key==='Enter') this.blur()">`;
            titleEl.querySelector('input').focus();
        }

        function finalizeRename(id, newName) {
            const p = playlists.find(x => x.id === id);
            if (newName.trim()) p.name = newName;
            save();
            renderSidebar();
            showPlaylist(id);
        }

        function playSong(e, url, title, albumOrPlaylist, artist, cover) {
            currentSong = { url, title, album: albumOrPlaylist, artist, cover };
            player.src = url;
            player.play();
            lastPlayedTime = Date.now();
            localStorage.setItem('lastPlayedTime', lastPlayedTime);
            updateUI();
            addToHistory(albumOrPlaylist, artist, cover);
            checkDockVisibility();
        }

        function addToHistory(name, artist, cover) {
            history = history.filter(h => h.album !== name);
            history.unshift({ album: name, artist, cover });
            localStorage.setItem('historyLog', JSON.stringify(history.slice(0, 10)));
            renderHistory();
        }

        function showView(type) {
            document.getElementById('album-view').classList.add('hidden');
            const grid = document.getElementById('grid-view');
            grid.classList.remove('hidden');
            if (type === 'home') {
                document.getElementById('album-grid').innerHTML = libraryData.map(a => `
                    <div class="bg-[#181818] p-4 rounded-lg hover:bg-[#282828] cursor-pointer" onclick="openAlbum('${a.albumName}')">
                        <img src="${a.coverArt}" class="w-full aspect-square rounded mb-4">
                        <div class="font-bold truncate">${a.albumName}</div>
                    </div>
                `).join('');
            }
        }

        function openAlbum(name) {
            const a = libraryData.find(x => x.albumName === name);
            document.getElementById('grid-view').classList.add('hidden');
            document.getElementById('album-view').classList.remove('hidden');
            document.getElementById('album-hero').innerHTML = `<img src="${a.coverArt}" class="w-52 h-52 rounded shadow-2xl"><div><h1 class="text-6xl font-black">${a.albumName}</h1></div>`;
            document.getElementById('track-list').innerHTML = a.songs.map((s, i) => `
                <div class="track-row" onclick="playSong(event, '${s.link}', '${s.name}', '${a.albumName}', '${a.artistName}', '${a.coverArt}')" oncontextmenu="handleContextMenu(event, {url:'${s.link}', title:'${s.name}', artist:'${a.artistName}', cover:'${a.coverArt}'})">
                    <span>${i+1}</span><div class="text-white">${s.name}</div><span>${a.albumName}</span><span>Recent</span><span>3:45</span>
                </div>
            `).join('');
        }

        function save() { localStorage.setItem('userPlaylists', JSON.stringify(playlists)); }
        function togglePlay() { player.paused ? player.play() : player.pause(); updateUI(); }
        function updateUI() {
            if (!currentSong) return;
            document.getElementById('p-title').innerText = currentSong.title;
            document.getElementById('p-cover').src = currentSong.cover;
            document.getElementById('right-cover').src = currentSong.cover;
            document.getElementById('play-icon').className = player.paused ? "fas fa-play ml-1" : "fas fa-pause";
        }
        function checkDockVisibility() {
            const oneHour = 3600000;
            if (Date.now() - lastPlayedTime < oneHour || !player.paused) {
                document.getElementById('main-dock').classList.remove('dock-hidden');
            }
        }
        function renderHistory() {
            const container = document.getElementById('history-container');
            container.innerHTML = '<span class="text-xs font-bold text-zinc-400 uppercase tracking-widest block mb-3">Recently Listened</span>' + 
            history.map(h => `<div class="flex items-center gap-3 p-2 hover:bg-zinc-900 cursor-pointer" onclick="playlists.some(p=>p.name==='${h.album}') ? showPlaylist(playlists.find(p=>p.name==='${h.album}').id) : openAlbum('${h.album}')">
                <img src="${h.cover}" class="w-10 h-10 rounded"><div><div class="text-sm font-bold text-white">${h.album}</div></div></div>`).join('');
        }
        function initResizers() { /* Implementation same as previous */ }
    </script>
</body>
</html>
