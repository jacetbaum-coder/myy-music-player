<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cloud Collection - Infinite Playlists</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: #000; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        /* Layout Containers */
        .sidebar { 
            width: 260px; 
            min-width: 150px; 
            max-width: 400px; 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            padding: 24px 16px; 
            flex-shrink: 0; 
        }

        .right-sidebar { 
            width: 280px; 
            min-width: 200px; 
            max-width: 450px; 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            padding: 24px 16px; 
            flex-shrink: 0; 
            transition: transform 0.3s ease; 
        }

        .main-view { 
            flex: 1; 
            background: linear-gradient(180deg, #222 0%, #000 100%); 
            overflow-y: auto; 
            padding: 32px; 
            position: relative; 
        }
        
        /* Resizer Handles */
        .resizer { 
            width: 4px; 
            cursor: col-resize; 
            background: transparent; 
            transition: background 0.2s; 
            z-index: 10; 
        }
        .resizer:hover { background: rgba(255,255,255,0.3); }

        /* Track Rows */
        .track-row { 
            display: grid; 
            grid-template-columns: 40px 4fr 3fr 2fr 60px; 
            gap: 12px; 
            padding: 10px; 
            border-radius: 4px; 
            align-items: center; 
            color: #b3b3b3; 
            font-size: 14px; 
            user-select: none; 
        }
        .track-row:hover { 
            background: rgba(255,255,255,0.1); 
            color: white; 
            cursor: pointer; 
        }
        .track-header { 
            text-transform: uppercase; 
            font-size: 11px; 
            letter-spacing: 1px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            margin-bottom: 16px; 
            padding-bottom: 8px; 
        }
        
        /* Player Bar */
        .player-bar { 
            height: 90px; 
            background: #000; 
            border-top: 1px solid #282828; 
            display: grid; 
            grid-template-columns: 30% 40% 30%; 
            align-items: center; 
            padding: 0 16px; 
            z-index: 50; 
            transition: transform 0.3s ease; 
        }

        /* Mobile Bottom Nav Bar */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: #000;
            border-top: 1px solid #282828;
            z-index: 100;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #b3b3b3;
            font-size: 10px;
            gap: 4px;
            cursor: pointer;
        }

        .nav-item.active {
            color: white;
        }

        .nav-item i {
            font-size: 20px;
        }

        .hidden { display: none !important; }
        .dock-hidden { transform: translateY(100%); pointer-events: none; }
        .sidebar-hidden { display: none !important; }

        /* Context Menu */
        #context-menu { 
            position: fixed; 
            background: #282828; 
            border-radius: 4px; 
            padding: 4px; 
            min-width: 200px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.5); 
            z-index: 1000; 
            display: none; 
        }
        .menu-item { 
            padding: 10px 12px; 
            font-size: 14px; 
            color: #eaeaea; 
            cursor: pointer; 
            border-radius: 2px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: relative; 
        }
        .menu-item:hover { background: #3e3e3e; }
        
        /* Submenu */
        .submenu { 
            position: absolute; 
            left: 100%; 
            top: 0; 
            background: #282828; 
            border-radius: 4px; 
            padding: 4px; 
            min-width: 180px; 
            display: none; 
            box-shadow: 8px 8px 16px rgba(0,0,0,0.5); 
        }
        .menu-item:hover > .submenu { display: block; }

        /* Helpers */
        .grid-cover { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; width: 100%; height: 100%; }
        .active-green { color: #1db954 !important; }
        .editable-title:hover { text-decoration: underline; cursor: pointer; }

        /* MOBILE OVERRIDES */
        @media (max-width: 768px) {
            .sidebar, .resizer, .right-sidebar { display: none !important; }
            .mobile-nav { display: flex; }
            .main-view { padding: 16px; padding-bottom: 160px; } 
            .track-row { grid-template-columns: 1fr 40px; }
            .track-row span:nth-child(3), 
            .track-row span:nth-child(4), 
            .track-row span:nth-child(5) { display: none; }
            .player-bar { 
                position: fixed;
                bottom: 70px;
                left: 0;
                right: 0;
                height: 75px;
                background: rgba(0,0,0,0.95);
                border-top: none;
                grid-template-columns: 1fr 1fr;
            } 
            .player-bar .flex-col { display: none; } /* Hide timeline on tiny mobile player bar */
            #album-hero { flex-direction: column; align-items: flex-start !important; gap: 16px; }
            #album-hero h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="context-menu">
        <div class="menu-item" onclick="menuAction('like')">
            Add to Liked Songs <i class="far fa-heart"></i>
        </div>
        <div class="menu-item">
            Add to Playlist <i class="fas fa-chevron-right text-xs"></i>
            <div id="playlist-submenu" class="submenu">
                <div class="menu-item border-b border-zinc-700" onclick="createNewPlaylist()">
                    <b>+ New Playlist</b>
                </div>
            </div>
        </div>
    </div>

    <div class="flex flex-1 overflow-hidden">
        <aside id="left-sidebar" class="sidebar">
            <div class="space-y-5">
                <div onclick="showView('home')" id="side-nav-home" class="flex items-center gap-4 text-white hover:text-white cursor-pointer transition font-bold text-sm">
                    <i class="fas fa-home text-xl w-6"></i> Home
                </div>
                <div class="flex items-center gap-4 text-zinc-400 hover:text-white cursor-pointer transition font-bold text-sm">
                    <i class="fas fa-search text-xl w-6"></i> Search
                </div>
            </div>

            <div class="mt-8 mb-4 flex items-center justify-between">
                <span class="text-xs font-bold text-zinc-400 uppercase tracking-widest">Your Library</span>
                <i onclick="createNewPlaylist()" class="fas fa-plus text-zinc-400 hover:text-white cursor-pointer"></i>
            </div>

            <div class="flex-1 overflow-y-auto space-y-2">
                <div onclick="showView('liked')" id="side-nav-liked" class="flex items-center gap-3 p-2 rounded hover:bg-zinc-900 cursor-pointer">
                    <div id="cover-liked" class="w-10 h-10 bg-gradient-to-br from-purple-700 to-blue-300 rounded overflow-hidden flex items-center justify-center">
                        <i class="fas fa-heart text-white"></i>
                    </div>
                    <div>
                        <div class="text-sm font-bold">Liked Songs</div>
                        <div id="count-liked" class="text-xs text-zinc-400">0 songs</div>
                    </div>
                </div>
                
                <div id="dynamic-playlists-list"></div>

                <div id="history-container" class="pt-4 border-t border-zinc-800 mt-4">
                    <span class="text-xs font-bold text-zinc-400 uppercase tracking-widest block mb-3">Recently Listened</span>
                </div>
            </div>
        </aside>

        <div id="resizer-left" class="resizer hidden md:block"></div>

        <main class="main-view" id="main-scroll-area">
            <div id="loading" class="text-center mt-20">
                <i class="fas fa-spinner fa-spin text-4xl text-[#1db954]"></i>
                <p class="mt-4 text-zinc-400">Loading your cloud library...</p>
            </div>

            <div id="grid-view" class="hidden">
                <h1 class="text-2xl font-black mb-6">Good evening</h1>
                <div id="album-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6"></div>
            </div>

            <div id="album-view" class="hidden">
                <button onclick="showView('home')" class="mb-6 bg-black/40 hover:bg-black/80 rounded-full w-8 h-8 flex items-center justify-center transition">
                    <i class="fas fa-chevron-left text-white"></i>
                </button>
                <div id="album-hero" class="flex items-end gap-6 mb-8"></div>
                <div class="track-row track-header">
                    <span>#</span>
                    <span>Title</span>
                    <span class="hidden md:block">Album</span>
                    <span class="hidden md:block">Date Added</span>
                    <span class="hidden md:block"><i class="far fa-clock"></i></span>
                </div>
                <div id="track-list"></div>
            </div>
        </main>

        <div id="resizer-right" class="resizer hidden md:block"></div>

        <aside id="right-sidebar" class="right-sidebar hidden md:flex sidebar-hidden">
            <div class="flex justify-between items-center mb-6">
                <span class="font-bold text-sm">Now Playing</span>
                <i class="fas fa-times text-zinc-400 hover:text-white cursor-pointer" onclick="toggleRightSidebar(false)"></i>
            </div>
            <img id="right-cover" class="w-full aspect-square rounded-lg shadow-2xl mb-4 bg-zinc-800">
            <h2 id="right-title" class="text-xl font-bold truncate"></h2>
            <p id="right-artist" class="text-zinc-400 text-sm mb-6"></p>
            <div class="bg-zinc-900 rounded-lg p-4">
                <p class="text-xs font-bold uppercase text-zinc-400 mb-2">About the artist</p>
                <p id="right-bio" class="text-sm text-zinc-300">Fetching cloud metadata...</p>
            </div>
        </aside>
    </div>

    <nav class="mobile-nav">
        <div class="nav-item active" id="nav-home" onclick="showView('home')">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </div>
        <div class="nav-item" id="nav-search">
            <i class="fas fa-search"></i>
            <span>Search</span>
        </div>
        <div class="nav-item" id="nav-library" onclick="showView('liked')">
            <i class="fas fa-book"></i>
            <span>Your Library</span>
        </div>
        <div class="nav-item" id="nav-create" onclick="createNewPlaylist()">
            <i class="fas fa-plus-square"></i>
            <span>Create</span>
        </div>
    </nav>

    <div id="main-dock" class="player-bar dock-hidden">
        <div class="flex items-center gap-4">
            <img id="p-cover" class="w-14 h-14 rounded shadow bg-zinc-800">
            <div class="overflow-hidden">
                <div id="p-title" class="font-bold text-sm text-white truncate"></div>
                <div id="p-artist" class="text-xs text-zinc-400 truncate"></div>
            </div>
        </div>
        
        <div class="flex flex-col items-center gap-2">
            <div class="flex items-center gap-6 text-zinc-400">
                <i id="btn-shuffle" onclick="this.classList.toggle('active-green')" class="fas fa-shuffle hover:text-white cursor-pointer"></i>
                <i class="fas fa-step-backward hover:text-white cursor-pointer" onclick="prevSong()"></i>
                <div class="w-8 h-8 bg-white rounded-full flex items-center justify-center hover:scale-105 cursor-pointer text-black" onclick="togglePlay()">
                    <i id="play-icon" class="fas fa-play ml-1"></i>
                </div>
                <i class="fas fa-step-forward hover:text-white cursor-pointer" onclick="nextSong()"></i>
                <i id="btn-repeat" onclick="this.classList.toggle('active-green')" class="fas fa-repeat hover:text-white cursor-pointer"></i>
            </div>
            <div class="w-full flex items-center gap-2 text-xs text-zinc-500">
                <span id="t-curr">0:00</span>
                <div class="h-1 bg-zinc-600 rounded-full flex-1 relative group cursor-pointer" id="progress-container" onclick="seek(event)">
                    <div id="progress-fill" class="h-full bg-white rounded-full w-0 group-hover:bg-[#1db954]"></div>
                </div>
                <span id="t-total">0:00</span>
            </div>
        </div>

        <div class="flex justify-end pr-4 gap-4 items-center">
            <i id="dock-heart" onclick="toggleLike()" class="far fa-heart hover:text-red-500 cursor-pointer text-lg"></i>
            <i class="fas fa-volume-up text-zinc-400 ml-2"></i>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        /**
         * APPLICATION STATE
         */
        let libraryData = [];
        let currentSong = null;
        let menuTargetSong = null;
        let history = JSON.parse(localStorage.getItem('historyLog')) || [];
        let likedSongs = JSON.parse(localStorage.getItem('likedSongs')) || [];
        let playlists = JSON.parse(localStorage.getItem('playlists')) || [];
        let lastPlayedTime = localStorage.getItem('lastPlayedTime') || 0;
        let activePlaylistIndex = null;
        
        const player = document.getElementById('audio-player');
        const dock = document.getElementById('main-dock');
        const rightSidebar = document.getElementById('right-sidebar');
        const contextMenu = document.getElementById('context-menu');

        /**
         * INITIALIZATION
         */
        window.onload = async () => {
            renderHistory();
            renderPlaylists();
            updateCounts();
            checkDockVisibility();
            initResizers();
            initGlobalKeys();
            
            try {
                const response = await fetch('/api/get-songs');
                libraryData = await response.json();
                document.getElementById('loading').classList.add('hidden');
                showView('home');
            } catch (error) {
                document.getElementById('loading').innerHTML = `<p class="text-red-500">Error: ${error.message}</p>`;
            }
        };

        // --- GLOBAL CONTROLS ---
        function initGlobalKeys() {
            window.addEventListener('keydown', (e) => {
                if (e.code === "Space") {
                    e.preventDefault();
                    togglePlay();
                }
            });
            document.addEventListener('click', (e) => { 
                if (!contextMenu.contains(e.target)) contextMenu.style.display = 'none'; 
            });
        }

        // --- NAVIGATION & VIEW RENDERING ---
        function showView(viewType, playlistIndex = null) {
            document.getElementById('grid-view').classList.add('hidden');
            document.getElementById('album-view').classList.add('hidden');
            activePlaylistIndex = playlistIndex;
            
            if (viewType === 'home') {
                document.getElementById('grid-view').classList.remove('hidden');
                renderGrid();
            } else if (viewType === 'liked') {
                document.getElementById('album-view').classList.remove('hidden');
                renderCollection("Liked Songs", likedSongs);
            } else if (viewType === 'playlist') {
                document.getElementById('album-view').classList.remove('hidden');
                const pl = playlists[playlistIndex];
                renderCollection(pl.name, pl.songs, true, playlistIndex);
            }

            updateActiveStates(viewType);
        }

        /**
         * Handles the "Active States" logic for icons
         */
        function updateActiveStates(viewType) {
            // Reset all mobile nav icons
            const mobileItems = ['nav-home', 'nav-search', 'nav-library', 'nav-create'];
            mobileItems.forEach(id => {
                document.getElementById(id).classList.remove('active');
            });

            // Reset all desktop sidebar links
            const sideHome = document.getElementById('side-nav-home');
            const sideLiked = document.getElementById('side-nav-liked');
            sideHome.classList.replace('text-white', 'text-zinc-400');
            sideLiked.classList.remove('bg-zinc-900');

            // Set active based on view
            if (viewType === 'home') {
                document.getElementById('nav-home').classList.add('active');
                sideHome.classList.replace('text-zinc-400', 'text-white');
            } else if (viewType === 'liked') {
                document.getElementById('nav-library').classList.add('active');
                sideLiked.classList.add('bg-zinc-900');
            }
        }

        function renderGrid() {
            const grid = document.getElementById('album-grid');
            grid.innerHTML = libraryData.map((album) => `
                <div class="bg-[#181818] p-4 rounded-lg hover:bg-[#282828] transition cursor-pointer group" onclick="openAlbumByName('${album.albumName}')">
                    <div class="relative shadow-xl mb-4 rounded-md overflow-hidden">
                        <img src="${album.coverArt}" class="w-full aspect-square object-cover">
                        <div class="absolute bottom-2 right-2 bg-[#1db954] w-10 h-10 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition shadow-lg">
                            <i class="fas fa-play text-black ml-1"></i>
                        </div>
                    </div>
                    <div class="font-bold text-white truncate">${album.albumName}</div>
                    <div class="text-sm text-zinc-400 truncate">${album.artistName}</div>
                </div>
            `).join('');
        }

        function openAlbumByName(name) {
            const album = libraryData.find(a => a.albumName === name);
            if (!album) return;
            
            document.getElementById('grid-view').classList.add('hidden');
            document.getElementById('album-view').classList.remove('hidden');
            
            document.getElementById('album-hero').innerHTML = `
                <img src="${album.coverArt}" class="w-52 h-52 shadow-2xl rounded">
                <div>
                    <p class="text-xs font-bold uppercase">Album</p>
                    <h1 class="text-6xl font-black my-4">${album.albumName}</h1>
                    <div class="flex items-center gap-2 text-sm font-bold">
                        <span>${album.artistName}</span>
                    </div>
                </div>`;
                
            const listEl = document.getElementById('track-list');
            listEl.innerHTML = '';
            
            album.songs.forEach((song, i) => {
                const row = document.createElement('div');
                row.className = "track-row group";
                row.onclick = () => playSpecificSong(song.link, song.name, album.albumName, album.artistName, album.coverArt);
                row.oncontextmenu = (e) => handleContextMenu(e, {...song, album: album.albumName, artist: album.artistName, cover: album.coverArt});
                setupLongPress(row, {...song, album: album.albumName, artist: album.artistName, cover: album.coverArt});
                
                row.innerHTML = `
                    <span class="text-zinc-400 group-hover:text-white">${i + 1}</span>
                    <div class="text-white font-medium truncate">${song.name.replace('.mp3', '')}</div>
                    <span class="truncate hidden md:block">${album.albumName}</span>
                    <span class="hidden md:block">Recent</span>
                    <span class="hidden md:block">3:45</span>`;
                listEl.appendChild(row);
            });
        }

        function renderCollection(title, list, isDynamic = false, plIndex = null) {
            const hero = document.getElementById('album-hero');
            let coverContent = `<i class="fas fa-music text-zinc-500 text-6xl"></i>`;
            
            if (title === "Liked Songs") {
                coverContent = `<i class="fas fa-heart text-white text-6xl"></i>`;
            } else if (list.length >= 4) {
                coverContent = `<div class="grid-cover">${list.slice(0,4).map(s => `<img src="${s.cover}" class="w-full h-full object-cover">`).join('')}</div>`;
            } else if (list.length > 0) {
                coverContent = `<img src="${list[0].cover}" class="w-full h-full object-cover">`;
            }

            const titleAction = isDynamic ? `onclick="renamePlaylist(${plIndex}, event)" class="editable-title"` : "";

            hero.innerHTML = `
                <div class="w-52 h-52 bg-zinc-800 rounded flex items-center justify-center shadow-2xl overflow-hidden">${coverContent}</div>
                <div>
                    <p class="text-xs font-bold uppercase">Playlist</p>
                    <h1 class="text-6xl font-black my-4" ${titleAction}>${title}</h1>
                </div>`;
            
            const listEl = document.getElementById('track-list');
            listEl.innerHTML = list.length === 0 ? `<p class="text-zinc-500 p-4">Empty.</p>` : '';
            
            list.forEach((song, i) => {
                const row = document.createElement('div');
                row.className = "track-row group";
                row.onclick = () => playSpecificSong(song.url || song.link, song.title || song.name, song.album, song.artist, song.cover);
                row.oncontextmenu = (e) => handleContextMenu(e, song);
                setupLongPress(row, song);
                
                row.innerHTML = `
                    <span class="text-zinc-400 group-hover:text-white">${i + 1}</span>
                    <div class="text-white font-medium truncate">${(song.title || song.name).replace('.mp3', '')}</div>
                    <span class="truncate hidden md:block">${song.album}</span>
                    <span class="hidden md:block">Saved</span>
                    <span class="hidden md:block">3:45</span>`;
                listEl.appendChild(row);
            });
        }

        // --- PLAYBACK ENGINE ---
        function playSpecificSong(url, title, album, artist, cover) {
            currentSong = { url, title, album, artist, cover };
            player.src = url;
            player.play();
            lastPlayedTime = Date.now();
            localStorage.setItem('lastPlayedTime', lastPlayedTime);
            
            dock.classList.remove('dock-hidden');
            if (window.innerWidth >= 768) rightSidebar.classList.remove('sidebar-hidden');
            
            document.getElementById('p-cover').src = cover;
            document.getElementById('p-title').innerText = title.replace('.mp3', '');
            document.getElementById('p-artist').innerText = artist;
            document.getElementById('play-icon').className = "fas fa-pause";
            
            document.getElementById('right-cover').src = cover;
            document.getElementById('right-title').innerText = title.replace('.mp3', '');
            document.getElementById('right-artist').innerText = artist;
            
            updateHeartUI();
            addToHistory(album, artist, cover);
        }

        function togglePlay() {
            if (!currentSong) return;
            if (player.paused) {
                player.play();
                document.getElementById('play-icon').className = "fas fa-pause";
            } else {
                player.pause();
                document.getElementById('play-icon').className = "fas fa-play ml-1";
            }
            checkDockVisibility();
        }

        function nextSong() { console.log("Next track logic goes here"); }
        function prevSong() { console.log("Prev track logic goes here"); }

        function seek(e) {
            const rect = document.getElementById('progress-container').getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            player.currentTime = pct * player.duration;
        }

        // --- PLAYLIST & HISTORY LOGIC ---
        function renderPlaylists() {
            const listContainer = document.getElementById('dynamic-playlists-list');
            const submenu = document.getElementById('playlist-submenu');
            if (!listContainer || !submenu) return;
            
            listContainer.innerHTML = '';
            submenu.innerHTML = `<div class="menu-item border-b border-zinc-700" onclick="createNewPlaylist()"><b>+ New Playlist</b></div>`;

            playlists.forEach((pl, index) => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-3 p-2 rounded hover:bg-zinc-900 cursor-pointer group relative";
                div.onclick = () => showView('playlist', index);
                
                let coverHtml = `<i class="fas fa-music text-zinc-500"></i>`;
                if (pl.songs.length >= 4) {
                    coverHtml = `<div class="grid-cover">${pl.songs.slice(0,4).map(s => `<img src="${s.cover}" class="w-full h-full object-cover">`).join('')}</div>`;
                } else if (pl.songs.length > 0) {
                    coverHtml = `<img src="${pl.songs[0].cover}" class="w-full h-full object-cover">`;
                }

                div.innerHTML = `
                    <div class="w-10 h-10 bg-zinc-800 rounded overflow-hidden flex items-center justify-center">${coverHtml}</div>
                    <div class="flex-1 truncate">
                        <div class="text-sm font-bold truncate">${pl.name}</div>
                        <div class="text-xs text-zinc-400">${pl.songs.length} songs</div>
                    </div>
                    <div class="flex gap-2 opacity-0 group-hover:opacity-100">
                        <i onclick="deletePlaylist(${index}, event)" class="fas fa-trash text-xs text-zinc-500 hover:text-red-500 p-1"></i>
                    </div>`;
                listContainer.appendChild(div);

                const subItem = document.createElement('div');
                subItem.className = "menu-item";
                subItem.innerText = pl.name;
                subItem.onclick = () => { addSongToPlaylist(index); contextMenu.style.display = 'none'; };
                submenu.appendChild(subItem);
            });
        }

        function createNewPlaylist() {
            const name = prompt("Playlist Name:", `My Playlist #${playlists.length + 1}`);
            if (name) {
                playlists.push({ name: name, songs: [] });
                saveAndRefresh();
            }
        }

        function deletePlaylist(index, e) {
            e.stopPropagation();
            if(confirm(`Delete "${playlists[index].name}"?`)) {
                playlists.splice(index, 1);
                saveAndRefresh();
                showView('home');
            }
        }

        function renamePlaylist(index, e) {
            if (e) e.stopPropagation();
            const newName = prompt("Rename Playlist:", playlists[index].name);
            if (newName && newName.trim() !== "") {
                playlists[index].name = newName;
                saveAndRefresh();
                showView('playlist', index);
            }
        }

        function addSongToPlaylist(playlistIndex) {
            const songToAdd = menuTargetSong || currentSong;
            if (!songToAdd) return;
            const exists = playlists[playlistIndex].songs.some(s => (s.url || s.link) === (songToAdd.url || songToAdd.link));
            if (!exists) {
                playlists[playlistIndex].songs.push({
                    url: songToAdd.link || songToAdd.url,
                    title: songToAdd.name || songToAdd.title,
                    album: songToAdd.album,
                    artist: songToAdd.artist,
                    cover: songToAdd.cover || songToAdd.coverArt
                });
                saveAndRefresh();
            }
        }

        function saveAndRefresh() {
            localStorage.setItem('playlists', JSON.stringify(playlists));
            renderPlaylists();
        }

        // --- UI & CONTEXT MENU ---
        function handleContextMenu(e, songData) {
            e.preventDefault();
            menuTargetSong = songData;
            contextMenu.style.display = 'block';
            contextMenu.style.left = e.pageX + 'px';
            contextMenu.style.top = e.pageY + 'px';
        }

        function menuAction(type) {
            if (!menuTargetSong) return;
            if (type === 'like') {
                const temp = currentSong;
                currentSong = {
                    url: menuTargetSong.link || menuTargetSong.url,
                    title: menuTargetSong.name || menuTargetSong.title,
                    cover: menuTargetSong.cover || menuTargetSong.coverArt,
                    artist: menuTargetSong.artist,
                    album: menuTargetSong.album
                };
                toggleLike();
                currentSong = temp;
            }
            contextMenu.style.display = 'none';
        }

        function setupLongPress(element, songData) {
            let pressTimer;
            element.addEventListener('touchstart', (e) => {
                pressTimer = window.setTimeout(() => handleContextMenu(e.touches[0], songData), 700);
            });
            element.addEventListener('touchend', () => clearTimeout(pressTimer));
        }

        function toggleLike() {
            if (!currentSong) return;
            const index = likedSongs.findIndex(s => s.url === currentSong.url);
            if (index === -1) {
                likedSongs.push({...currentSong});
            } else {
                likedSongs.splice(index, 1);
            }
            localStorage.setItem('likedSongs', JSON.stringify(likedSongs));
            updateCounts();
            updateHeartUI();
        }

        function updateHeartUI() {
            const heart = document.getElementById('dock-heart');
            if (!heart) return;
            const isLiked = currentSong && likedSongs.some(s => s.url === currentSong.url);
            heart.className = isLiked ? "fas fa-heart text-red-500 cursor-pointer text-lg" : "far fa-heart hover:text-red-500 cursor-pointer text-lg";
        }

        function updateCounts() {
            const el = document.getElementById('count-liked');
            if (el) el.innerText = `${likedSongs.length} songs`;
        }

        function addToHistory(album, artist, cover) {
            history = history.filter(h => h.album !== album);
            history.unshift({ album, artist, cover });
            localStorage.setItem('historyLog', JSON.stringify(history.slice(0, 10)));
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            if (!container) return;
            container.innerHTML = '<span class="text-xs font-bold text-zinc-400 uppercase tracking-widest block mb-3">Recently Listened</span>';
            history.forEach(h => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-3 p-2 rounded hover:bg-zinc-900 cursor-pointer mb-1";
                div.onclick = () => openAlbumByName(h.album);
                div.innerHTML = `
                    <img src="${h.cover}" class="w-10 h-10 rounded object-cover">
                    <div class="truncate">
                        <div class="text-sm font-bold text-white truncate">${h.album}</div>
                        <div class="text-xs text-zinc-400">${h.artist}</div>
                    </div>`;
                container.appendChild(div);
            });
        }

        function checkDockVisibility() {
            const oneHour = 3600000;
            const isRecent = (Date.now() - lastPlayedTime < oneHour);
            if (isRecent || !player.paused) {
                dock.classList.remove('dock-hidden');
            } else {
                dock.classList.add('dock-hidden');
            }
        }

        function initResizers() {
            const handleResize = (side, resizer, element) => {
                if (!resizer || !element) return;
                resizer.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    const resize = (ev) => {
                        if (side === 'left') {
                            if (ev.clientX > 150 && ev.clientX < 400) element.style.width = ev.clientX + 'px';
                        } else {
                            const w = window.innerWidth - ev.clientX;
                            if (w > 200 && w < 450) element.style.width = w + 'px';
                        }
                    };
                    const stop = () => document.removeEventListener('mousemove', resize);
                    document.addEventListener('mousemove', resize);
                    document.addEventListener('mouseup', stop);
                });
            };
            handleResize('left', document.getElementById('resizer-left'), document.getElementById('left-sidebar'));
            handleResize('right', document.getElementById('resizer-right'), document.getElementById('right-sidebar'));
        }

        function toggleRightSidebar(show) {
            const el = document.getElementById('right-sidebar');
            if (el) el.classList.toggle('sidebar-hidden', !show);
        }

        player.ontimeupdate = () => {
            if(player.duration) {
                const fill = document.getElementById('progress-fill');
                const curr = document.getElementById('t-curr');
                const total = document.getElementById('t-total');
                if (fill) fill.style.width = (player.currentTime / player.duration) * 100 + "%";
                if (curr) curr.innerText = formatTime(player.currentTime);
                if (total) total.innerText = formatTime(player.duration);
            }
        };

        function formatTime(s) {
            const m = Math.floor(s/60);
            const sec = Math.floor(s%60);
            return `${m}:${sec < 10 ? '0'+sec : sec}`;
        }
        
        setInterval(checkDockVisibility, 60000);
    </script>
</body>
</html>
