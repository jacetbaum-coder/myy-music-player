<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Cloud Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        /* Spotify-style Gradient Background */
        .main-view { background: linear-gradient(to bottom, #222, #121212); flex: 1; overflow-y: auto; padding: 40px; }
        /* Album Card Styling */
        .album-card { background: #181818; padding: 16px; border-radius: 8px; transition: all 0.3s ease; cursor: pointer; }
        .album-card:hover { background: #282828; transform: translateY(-5px); }
        .album-card img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 6px; margin-bottom: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        /* Bottom Player Bar */
        .player-bar { height: 90px; background: #000; display: flex; align-items: center; padding: 0 16px; border-top: 1px solid #282828; }
    </style>
</head>
<body>
    <div class="flex-1 overflow-hidden flex flex-col">
        <div class="main-view">
            <h1 class="text-3xl font-bold mb-8 text-white">Your Collection</h1>
            <div id="album-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-6">
                <div class="text-gray-400">Loading your 130+ covers...</div>
            </div>
        </div>
    </div>

    <div class="player-bar">
        <div class="w-1/3 flex items-center gap-4">
            <img id="now-playing-cover" class="w-14 h-14 rounded shadow-lg" src="https://via.placeholder.com/150?text=None">
            <div class="overflow-hidden">
                <div id="now-playing-title" class="font-bold text-sm truncate">Select an album</div>
                <div id="now-playing-artist" class="text-xs opacity-70 truncate text-gray-400">Artist</div>
            </div>
        </div>
        <div class="w-1/3 flex justify-center">
            <audio id="audioPlayer" controls class="w-full max-w-md h-8"></audio>
        </div>
        <div class="w-1/3"></div>
    </div>

    <script>
        async function loadCollection() {
            try {
                const res = await fetch('/api/get-songs');
                const albums = await res.json();
                const grid = document.getElementById('album-grid');
                grid.innerHTML = '';

                albums.forEach(album => {
                    const card = document.createElement('div');
                    card.className = 'album-card';
                    // This uses the cover art found by your new API logic
                    card.innerHTML = `
                        <img src="${album.coverArt || 'https://via.placeholder.com/300?text=No+Cover'}" loading="lazy">
                        <div class="font-bold truncate text-sm text-white">${album.albumName}</div>
                        <div class="text-xs opacity-60 truncate text-gray-400">${album.artistName}</div>
                    `;
                    
                    // When clicked, play the first song in that album folder
                    card.onclick = () => {
                        if (album.songs.length > 0) {
                            const player = document.getElementById('audioPlayer');
                            player.src = album.songs[0].webContentLink;
                            player.play();
                            document.getElementById('now-playing-title').textContent = album.songs[0].name;
                            document.getElementById('now-playing-artist').textContent = album.artistName;
                            document.getElementById('now-playing-cover').src = album.coverArt || '';
                        }
                    };
                    grid.appendChild(card);
                });
            } catch (err) {
                console.error("Failed to load music:", err);
                document.getElementById('album-grid').innerHTML = "Error loading collection. Check Vercel logs.";
            }
        }
        window.onload = loadCollection;
    </script>
</body>
</html>
