<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Cloud Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: 'Circular', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .app-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* Sidebar Styling */
        .sidebar { background: #000; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; min-width: 200px; max-width: 600px; position: relative; }
        #left-panel { width: 300px; }
        #right-sidebar { width: 300px; transition: opacity 0.5s ease; }
        .sidebar-hidden { width: 0 !important; padding: 0 !important; opacity: 0 !important; pointer-events: none; }

        /* Resizer Handles */
        .resizer { width: 6px; position: absolute; top: 0; bottom: 0; z-index: 50; cursor: grab; }
        #resizer-l { right: 0; }
        #resizer-r { left: 0; }

        .main-view { flex: 1; background: linear-gradient(to bottom, #1a1a1a, #000); overflow-y: auto; padding: 24px; }
        
        /* Album Card with Shuffle Overlay */
        .album-card { background: #181818; padding: 16px; border-radius: 8px; transition: 0.3s; cursor: pointer; position: relative; }
        .album-card:hover { background: #282828; }
        .shuffle-badge { 
            position: absolute; bottom: 85px; right: 25px; width: 40px; height: 40px; 
            background: #1db954; border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; opacity: 0; transition: 0.3s; box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        .album-card:hover .shuffle-badge { opacity: 1; transform: translateY(-5px); }

        /* Player Bar */
        .player-bar { 
            height: 90px; background: #000; display: grid; grid-template-columns: 30% 40% 30%; 
            align-items: center; padding: 0 16px; border-top: 1px solid #282828; z-index: 100;
        }
        .shuffle-active { color: #1db954 !important; }
        
        /* Metadata Table */
        .track-grid { display: grid; grid-template-columns: 50px 4fr 3fr 2fr 100px; gap: 16px; padding: 8px 16px; align-items: center; border-radius: 4px; }
        .track-header { border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 8px; color: #b3b3b3; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }

        #volume-bar { width: 80px; height: 3px; accent-color: #1db954; }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar border-r border-zinc-800" id="left-panel">
            <h3 class="font-bold text-zinc-400 mb-4 uppercase text-[11px] tracking-widest">Recently Listened</h3>
            <div id="recent-list" class="space-y-4"></div>
            <div class="resizer" id="resizer-l"></div>
        </aside>

        <main class="main-view">
            <button id="back-btn" onclick="showGrid()" class="hidden mb-6 opacity-70 hover:opacity-100 font-bold text-sm"><i class="fas fa-chevron-left mr-2"></i> Back</button>
            <div id="album-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6"></div>
            
            <div id="track-list" class="hidden">
                <div id="album-header-container" class="flex items-end gap-8 mb-10"></div>
                <div class="track-grid track-header">
                    <span>#</span><span>Title</span><span>Album</span><span>Date Added</span><span><i class="far fa-clock"></i></span>
                </div>
                <div id="songs-container"></div>
            </div>
        </main>

        <aside id="right-sidebar" class="sidebar border-l border-zinc-800 sidebar-hidden">
            <div class="resizer" id="resizer-r"></div>
            <div id="artist-spotlight"></div>
        </aside>
    </div>

    <div id="player-dock" class="player-bar">
        <div class="flex items-center gap-4 overflow-hidden">
            <div id="mini-cover" class="w-14 h-14 bg-zinc-800 rounded bg-cover bg-center"></div>
            <div class="truncate">
                <div id="now-playing" class="font-bold text-[14px] truncate">Nothing Playing</div>
                <div id="now-artist" class="text-[11px] text-zinc-400 truncate"></div>
            </div>
        </div>

        <div class="flex flex-col items-center gap-2">
            <div class="flex items-center gap-6">
                <i id="shuffle-btn" class="fas fa-shuffle control-btn text-sm cursor-pointer" onclick="toggleShuffle()"></i>
                <i class="fas fa-step-backward control-btn" onclick="playPrevious()"></i>
                <i id="master-play" class="fas fa-play-circle text-3xl control-btn" onclick="togglePlay()"></i>
                <i class="fas fa-step-forward control-btn" onclick="playNext()"></i>
            </div>
            <div class="w-full flex items-center gap-2 text-[11px] text-zinc-400">
                <span id="current-time">0:00</span>
                <input type="range" id="progress-bar" class="flex-1" value="0" oninput="seekAudio()">
                <span id="total-time">0:00</span>
            </div>
        </div>

        <div class="flex justify-end items-center gap-3">
            <input type="range" id="volume-bar" value="80" oninput="changeVolume()">
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        let albums = [];
        let currentAlbumSongs = [];
        let currentIndex = -1;
        let isShuffle = false;
        let recentHistory = JSON.parse(localStorage.getItem('recentHistory')) || [];

        const player = document.getElementById('audioPlayer');
        const shuffleBtn = document.getElementById('shuffle-btn');

        async function init() {
            const res = await fetch('/api/get-songs');
            albums = await res.json();
            showGrid();
            renderHistory();
            initResizers();
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;
            shuffleBtn.classList.toggle('shuffle-active', isShuffle);
        }

        function showGrid() {
            const grid = document.getElementById('album-grid');
            grid.innerHTML = albums.map((a, i) => `
                <div class="album-card" onclick="showTracks(${i})">
                    <img src="${a.coverArt}" class="w-full aspect-square object-cover rounded shadow-lg mb-4">
                    <div class="shuffle-badge" onclick="event.stopPropagation(); shuffleAndPlay(${i})">
                        <i class="fas fa-play text-black text-xs"></i>
                    </div>
                    <div class="font-bold truncate text-sm">${a.albumName}</div>
                </div>`).join('');
        }

        function showTracks(index) {
            const album = albums[index];
            currentAlbumSongs = album.songs;
            document.getElementById('album-grid').classList.add('hidden');
            document.getElementById('track-list').classList.remove('hidden');
            document.getElementById('back-btn').classList.remove('hidden');

            document.getElementById('album-header-container').innerHTML = `
                <img src="${album.coverArt}" class="w-52 h-52 shadow-2xl rounded">
                <div>
                    <h1 class="text-6xl font-black">${album.albumName}</h1>
                    <p class="mt-4 text-zinc-400 font-bold">${album.artistName} • ${album.songs.length} songs</p>
                </div>`;

            document.getElementById('songs-container').innerHTML = album.songs.map((s, idx) => `
                <div class="track-grid hover:bg-white/10 cursor-pointer group" onclick="playSong(${idx})">
                    <span class="text-zinc-500 group-hover:text-white">${idx + 1}</span>
                    <div class="flex flex-col">
                        <span class="text-white font-medium">${s.name.replace('.mp3','')}</span>
                        <span class="text-xs text-zinc-400">${album.artistName}</span>
                    </div>
                    <span class="text-zinc-400 text-sm">${album.albumName}</span>
                    <span class="text-zinc-400 text-sm">Dec 25, 2025</span>
                    <span class="text-zinc-400 text-sm">${s.duration || '3:45'}</span>
                </div>`).join('');
        }

        function shuffleAndPlay(index) {
            isShuffle = true;
            shuffleBtn.classList.add('shuffle-active');
            showTracks(index);
            playNext();
        }

        async function playSong(index) {
            currentIndex = index;
            const s = currentAlbumSongs[currentIndex];
            player.src = s.link;
            player.play();
            updateUI(s);
        }

        function playNext() {
            if (isShuffle) {
                currentIndex = Math.floor(Math.random() * currentAlbumSongs.length);
            } else {
                currentIndex = (currentIndex + 1) % currentAlbumSongs.length;
            }
            playSong(currentIndex);
        }

        function updateUI(s) {
            document.getElementById('now-playing').innerText = s.name.replace('.mp3','');
            document.getElementById('now-artist').innerText = albums.find(a => a.songs.includes(s)).artistName;
            document.getElementById('mini-cover').style.backgroundImage = `url(${albums.find(a => a.songs.includes(s)).coverArt})`;
        }

        player.onended = playNext;
        window.onload = init;
        
        // Boilerplate helpers
        function togglePlay() { player.paused ? player.play() : player.pause(); }
        function changeVolume() { player.volume = document.getElementById('volume-bar').value / 100; }
        function seekAudio() { player.currentTime = player.duration * (document.getElementById('progress-bar').value / 100); }
        function renderHistory() { /* Previous logic */ }
        function initResizers() { /* Previous logic */ }
    </script>
</body>
</html>
