<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Cloud Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .app-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebars */
        .sidebar { width: 280px; background: #000; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        @media (max-width: 1024px) { .sidebar { display: none; } }

        .main-view { flex: 1; background: linear-gradient(to bottom, #121212, #000); overflow-y: auto; padding: 20px; }
        
        /* Context Menu Styling */
        #context-menu {
            position: fixed;
            display: none;
            background: #282828;
            border-radius: 4px;
            padding: 4px;
            min-width: 180px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .menu-item {
            padding: 12px 16px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .menu-item:hover { background: #3e3e3e; }

        .album-card { background: #181818; padding: 16px; border-radius: 8px; transition: 0.3s; cursor: pointer; }
        .album-card:hover { background: #282828; }
        .player-bar { height: 90px; background: #000; display: flex; align-items: center; padding: 0 20px; border-top: 1px solid #232323; }
        .cover-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 4px; margin-bottom: 12px; }
    </style>
</head>
<body onclick="hideMenu()">

    <div class="app-container">
        <aside class="sidebar border-r border-zinc-900">
            <div class="mb-8">
                <h3 class="font-bold text-zinc-400 mb-4 uppercase text-[10px] tracking-widest flex justify-between items-center">
                    Your Library
                    <i class="fas fa-plus cursor-pointer hover:text-white" onclick="createNewPlaylist()"></i>
                </h3>
                <div id="playlist-list" class="space-y-2">
                    </div>
            </div>
            
            <h3 class="font-bold text-zinc-400 mb-4 uppercase text-[10px] tracking-widest">Recent</h3>
            <div id="recent-list" class="space-y-4"></div>
        </aside>

        <main class="main-view">
            <button id="back-btn" onclick="showGrid()" class="hidden mb-6 opacity-70 hover:opacity-100 font-bold"><i class="fas fa-chevron-left"></i> Back</button>
            <div id="album-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
            <div id="track-list" class="hidden">
                <div id="album-header-container"></div>
                <div id="songs-container" class="space-y-1"></div>
            </div>
        </main>

        <aside class="sidebar border-l border-zinc-900">
            <div id="artist-spotlight" class="text-center opacity-50">
                <p class="text-sm mt-20">Play a song to see details</p>
            </div>
        </aside>
    </div>

    <div id="context-menu">
        <div class="menu-item" onclick="createNewPlaylist()">New Playlist <i class="fas fa-plus text-[10px]"></i></div>
        <div id="add-to-options"></div>
    </div>

    <div class="player-bar">
        <div class="w-1/3 flex items-center gap-4">
            <div id="mini-cover" class="w-12 h-12 bg-zinc-800 rounded hidden md:block"></div>
            <div>
                <div id="now-playing" class="font-bold text-sm">Nothing Playing</div>
                <div id="now-artist" class="text-xs text-zinc-400"></div>
            </div>
        </div>
        <div class="w-1/3 flex justify-center">
            <audio id="audioPlayer" controls crossorigin="anonymous" class="w-full max-w-md h-8"></audio>
        </div>
        <div class="w-1/3"></div>
    </div>

    <script>
        let albums = [];
        let playlists = {};
        let selectedSongForMenu = null;
        const player = document.getElementById('audioPlayer');

        async function init() {
            try {
                const res = await fetch('/api/get-songs');
                const data = await res.json();
                
                // If the API returns our playlists object along with albums
                albums = data.albums || data; 
                playlists = data.playlists || {};
                
                renderPlaylists();
                showGrid();
            } catch (err) { console.error(err); }
        }

        // --- PLAYLIST LOGIC ---
        function renderPlaylists() {
            const container = document.getElementById('playlist-list');
            container.innerHTML = Object.keys(playlists).map(name => `
                <div class="flex items-center gap-3 p-2 hover:bg-zinc-900 rounded cursor-pointer group">
                    <div class="w-10 h-10 bg-zinc-800 rounded flex items-center justify-center">
                        <i class="fas fa-music text-zinc-500 text-xs"></i>
                    </div>
                    <span class="text-sm font-medium truncate">${name}</span>
                </div>
            `).join('');
        }

        async function createNewPlaylist() {
            const name = prompt("Enter Playlist Name:");
            if (!name || playlists[name]) return;
            
            playlists[name] = [];
            if (selectedSongForMenu) {
                playlists[name].push(selectedSongForMenu);
            }
            await savePlaylistsToDB();
            renderPlaylists();
            hideMenu();
        }

        async function savePlaylistsToDB() {
            await fetch('/api/get-songs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key: 'user-playlists', data: playlists })
            });
        }

        // --- CONTEXT MENU LOGIC ---
        window.oncontextmenu = function(e) {
            const trackRow = e.target.closest('.track-row');
            if (trackRow) {
                e.preventDefault();
                selectedSongForMenu = JSON.parse(trackRow.dataset.songInfo);
                const menu = document.getElementById('context-menu');
                menu.style.display = 'block';
                menu.style.left = e.pageX + 'px';
                menu.style.top = e.pageY + 'px';
                
                // Show existing playlists in the "Add to" section
                const addOptions = document.getElementById('add-to-options');
                addOptions.innerHTML = Object.keys(playlists).map(p => `
                    <div class="menu-item" onclick="addToPlaylist('${p}')">${p}</div>
                `).join('');
            }
        };

        async function addToPlaylist(pName) {
            if (!playlists[pName].some(s => s.link === selectedSongForMenu.link)) {
                playlists[pName].push(selectedSongForMenu);
                await savePlaylistsToDB();
            }
            hideMenu();
        }

        function hideMenu() {
            document.getElementById('context-menu').style.display = 'none';
        }

        // --- CORE VIEW LOGIC ---
        function showGrid() {
            const grid = document.getElementById('album-grid');
            grid.innerHTML = '';
            document.getElementById('track-list').classList.add('hidden');
            document.getElementById('back-btn').classList.add('hidden');
            grid.classList.remove('hidden');

            albums.forEach((a, i) => {
                const div = document.createElement('div');
                div.className = 'album-card';
                div.innerHTML = `
                    <img src="${a.coverArt}" class="cover-img shadow-lg">
                    <div class="font-bold truncate text-sm">${a.albumName}</div>
                    <div class="text-xs text-zinc-500 truncate">${a.artistName}</div>
                `;
                div.onclick = () => showTracks(i);
                grid.appendChild(div);
            });
        }

        function showTracks(i) {
            const album = albums[i];
            const list = document.getElementById('track-list');
            const header = document.getElementById('album-header-container');
            const container = document.getElementById('songs-container');
            
            document.getElementById('album-grid').classList.add('hidden');
            list.classList.remove('hidden');
            document.getElementById('back-btn').classList.remove('hidden');

            header.innerHTML = `
                <div class="flex items-end gap-6 mb-8 p-4">
                    <img src="${album.coverArt}" class="w-52 h-52 object-cover rounded shadow-2xl">
                    <div>
                        <h2 class="text-5xl font-black mb-2">${album.albumName}</h2>
                        <p class="opacity-70">${album.artistName}</p>
                    </div>
                </div>
            `;

            container.innerHTML = '';
            album.songs.forEach((s, idx) => {
                const row = document.createElement('div');
                row.className = 'track-row p-3 cursor-pointer rounded flex items-center gap-4 group hover:bg-white/5';
                row.dataset.songInfo = JSON.stringify({...s, artist: album.artistName, cover: album.coverArt});
                
                let cleanTitle = s.name.replace('.mp3', '').replace(new RegExp(`^${album.artistName}\\s*-\\s*`, 'i'), '');

                row.innerHTML = `
                    <span class="w-4 text-zinc-500 text-xs">${idx + 1}</span>
                    <span class="text-sm font-medium flex-1">${cleanTitle}</span>
                `;
                row.onclick = () => {
                    player.src = s.link;
                    player.play();
                    document.getElementById('now-playing').innerText = cleanTitle;
                    document.getElementById('now-artist').innerText = album.artistName;
                    
                    // Update Spotlight & Mini Cover
                    document.getElementById('mini-cover').style.backgroundImage = `url(${album.coverArt})`;
                    document.getElementById('mini-cover').style.backgroundSize = 'cover';
                    document.getElementById('mini-cover').classList.remove('hidden');
                    
                    document.getElementById('artist-spotlight').innerHTML = `
                        <img src="${album.coverArt}" class="w-full rounded-lg mb-4">
                        <h4 class="font-bold">${album.albumName}</h4>
                        <p class="text-xs text-zinc-400">${album.artistName}</p>
                    `;
                };
                container.appendChild(row);
            });
        }

        init();
    </script>
</body>
</html>
