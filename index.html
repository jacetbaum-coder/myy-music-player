<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Cloud Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: 'Circular', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .app-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* Sidebars */
        .sidebar { background: #000; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; min-width: 200px; max-width: 600px; position: relative; }
        #left-panel { width: 300px; }
        #right-sidebar { width: 300px; transition: opacity 0.5s ease; }

        /* Custom Dropdown Styling (Sleek & Seamless) */
        .sort-menu {
            position: absolute; background: #282828; border-radius: 4px; padding: 4px;
            box-shadow: 0 16px 24px rgba(0,0,0,0.5); z-index: 1000; display: none; min-width: 160px;
        }
        .sort-item {
            padding: 10px 12px; font-size: 14px; color: #b3b3b3; cursor: pointer; border-radius: 2px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .sort-item:hover { background: rgba(255,255,255,0.1); color: white; }
        .sort-item.active { color: #1db954; }

        /* Metadata Table */
        .track-grid { display: grid; grid-template-columns: 50px 4fr 3fr 2fr 80px; gap: 16px; padding: 8px 16px; align-items: center; border-radius: 4px; transition: 0.2s; }
        .track-grid:hover:not(.track-header) { background: rgba(255,255,255,0.1); }
        .track-header { border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 8px; color: #b3b3b3; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

        /* Resizers */
        .resizer { width: 6px; position: absolute; top: 0; bottom: 0; z-index: 50; cursor: grab; }
        #resizer-l { right: 0; }
        #resizer-r { left: 0; }

        .main-view { flex: 1; background: linear-gradient(to bottom, #1a1a1a, #000); overflow-y: auto; padding: 24px; }
        .player-bar { height: 90px; background: #000; display: grid; grid-template-columns: 30% 40% 30%; align-items: center; padding: 0 16px; border-top: 1px solid #282828; }
        .shuffle-active { color: #1db954 !important; }
        #volume-bar { width: 80px; height: 3px; accent-color: #1db954; }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar border-r border-zinc-800" id="left-panel">
            <div class="flex items-center justify-between mb-4">
                <span class="text-zinc-400 font-bold text-xs uppercase tracking-widest">Library</span>
                <button onclick="toggleSortMenu(event, 'library-sort')" class="text-zinc-400 hover:text-white transition"><i class="fas fa-list"></i></button>
            </div>
            
            <div id="library-sort" class="sort-menu">
                <div class="px-3 py-2 text-[11px] font-bold text-zinc-500 uppercase">Sort by</div>
                <div class="sort-item active" onclick="sortLibrary('recent')">Recents <i class="fas fa-check text-[10px]"></i></div>
                <div class="sort-item" onclick="sortLibrary('az')">Alphabetical</div>
                <div class="sort-item" onclick="sortLibrary('creator')">Creator</div>
            </div>

            <div id="recent-list" class="space-y-4"></div>
            <div class="resizer" id="resizer-l"></div>
        </aside>

        <main class="main-view">
            <button id="back-btn" onclick="showGrid()" class="hidden mb-6 opacity-70 hover:opacity-100 font-bold text-sm"><i class="fas fa-chevron-left mr-2"></i> Back</button>
            <div id="album-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6"></div>
            
            <div id="track-list" class="hidden">
                <div id="album-header-container" class="flex items-end gap-8 mb-10"></div>
                
                <div class="track-grid track-header">
                    <span>#</span>
                    <span class="cursor-pointer hover:text-white" onclick="sortTracks('title')">Title</span>
                    <span class="cursor-pointer hover:text-white" onclick="sortTracks('album')">Album</span>
                    <span class="cursor-pointer hover:text-white" onclick="sortTracks('date')">Date Added</span>
                    <span><i class="far fa-clock"></i></span>
                </div>
                <div id="songs-container"></div>
            </div>
        </main>

        <aside id="right-sidebar" class="sidebar border-l border-zinc-800 sidebar-hidden">
            <div class="resizer" id="resizer-r"></div>
            <div id="artist-spotlight"></div>
        </aside>
    </div>

    <div id="player-dock" class="player-bar">
        <div class="flex items-center gap-4 overflow-hidden">
            <div id="mini-cover" class="w-14 h-14 bg-zinc-800 rounded bg-cover bg-center"></div>
            <div class="truncate">
                <div id="now-playing" class="font-bold text-[14px] truncate">Nothing Playing</div>
                <div id="now-artist" class="text-[11px] text-zinc-400 truncate"></div>
            </div>
        </div>

        <div class="flex flex-col items-center gap-2">
            <div class="flex items-center gap-6">
                <i id="shuffle-btn" class="fas fa-shuffle control-btn text-sm cursor-pointer" onclick="toggleShuffle()"></i>
                <i class="fas fa-step-backward control-btn" onclick="playPrevious()"></i>
                <i id="master-play" class="fas fa-play-circle text-3xl control-btn" onclick="togglePlay()"></i>
                <i class="fas fa-step-forward control-btn" onclick="playNext()"></i>
            </div>
            <div class="w-full flex items-center gap-2 text-[11px] text-zinc-400">
                <span id="current-time">0:00</span>
                <input type="range" id="progress-bar" class="flex-1" value="0" oninput="seekAudio()">
                <span id="total-time">0:00</span>
            </div>
        </div>

        <div class="flex justify-end items-center gap-3">
            <input type="range" id="volume-bar" value="80" oninput="changeVolume()">
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        let albums = [];
        let currentAlbumSongs = [];
        let currentIndex = -1;
        let isShuffle = false;
        let recentHistory = JSON.parse(localStorage.getItem('recentHistory')) || [];

        async function init() {
            const res = await fetch('/api/get-songs');
            albums = await res.json();
            showGrid();
            renderHistory();
            initResizers();
            window.addEventListener('click', () => { // Close menus on outside click
                document.querySelectorAll('.sort-menu').forEach(m => m.style.display = 'none');
            });
        }

        // 1. Sort Menus Logic
        function toggleSortMenu(e, id) {
            e.stopPropagation();
            const menu = document.getElementById(id);
            const isVisible = menu.style.display === 'block';
            document.querySelectorAll('.sort-menu').forEach(m => m.style.display = 'none');
            menu.style.display = isVisible ? 'none' : 'block';
            menu.style.top = (e.clientY + 10) + 'px';
            menu.style.left = (e.clientX - 140) + 'px';
        }

        function sortLibrary(criteria) {
            if (criteria === 'az') {
                recentHistory.sort((a, b) => a.albumName.localeCompare(b.albumName));
            } else if (criteria === 'recent') {
                recentHistory = JSON.parse(localStorage.getItem('recentHistory')) || [];
            }
            renderHistory();
        }

        function sortTracks(criteria) {
            if (criteria === 'title') {
                currentAlbumSongs.sort((a, b) => a.name.localeCompare(b.name));
            } else if (criteria === 'album') {
                // Since this is an album view, it stays same, but useful for playlists
            }
            renderTracks();
        }

        // 2. Metadata Rendering
        function showTracks(index) {
            const album = albums[index];
            currentAlbumSongs = [...album.songs]; // Clone for sorting
            document.getElementById('album-grid').classList.add('hidden');
            document.getElementById('track-list').classList.remove('hidden');
            document.getElementById('back-btn').classList.remove('hidden');

            document.getElementById('album-header-container').innerHTML = `
                <img src="${album.coverArt}" class="w-52 h-52 shadow-2xl rounded">
                <div>
                    <h1 class="text-6xl font-black">${album.albumName}</h1>
                    <p class="mt-4 text-zinc-400 font-bold">${album.artistName} • ${album.songs.length} songs</p>
                </div>`;
            renderTracks(album);
        }

        function renderTracks(album = null) {
            const currentAlbum = album || albums.find(a => a.songs.includes(currentAlbumSongs[0]));
            document.getElementById('songs-container').innerHTML = currentAlbumSongs.map((s, idx) => `
                <div class="track-grid group" onclick="playSong(${idx})">
                    <span class="text-zinc-500 group-hover:text-white">${idx + 1}</span>
                    <div class="flex flex-col">
                        <span class="text-white font-medium truncate">${s.name.replace('.mp3','')}</span>
                        <span class="text-xs text-zinc-400">${currentAlbum.artistName}</span>
                    </div>
                    <span class="text-zinc-400 text-sm truncate">${currentAlbum.albumName}</span>
                    <span class="text-zinc-400 text-sm">4 weeks ago</span>
                    <span class="text-zinc-400 text-sm">3:23</span>
                </div>`).join('');
        }

        // Shuffle & Audio Logic (Keeping current functionality)
        function toggleShuffle() {
            isShuffle = !isShuffle;
            document.getElementById('shuffle-btn').classList.toggle('shuffle-active', isShuffle);
        }

        function playNext() {
            currentIndex = isShuffle ? Math.floor(Math.random() * currentAlbumSongs.length) : (currentIndex + 1) % currentAlbumSongs.length;
            playSong(currentIndex);
        }

        async function playSong(index) {
            currentIndex = index;
            const s = currentAlbumSongs[currentIndex];
            const album = albums.find(a => a.songs.includes(s));
            document.getElementById('audioPlayer').src = s.link;
            document.getElementById('audioPlayer').play();
            updateDock(s, album);
        }

        function updateDock(s, album) {
            document.getElementById('now-playing').innerText = s.name.replace('.mp3','');
            document.getElementById('now-artist').innerText = album.artistName;
            document.getElementById('mini-cover').style.backgroundImage = `url(${album.coverArt})`;
        }

        function showGrid() {
            document.getElementById('album-grid').classList.remove('hidden');
            document.getElementById('track-list').classList.add('hidden');
            document.getElementById('back-btn').classList.add('hidden');
        }

        function renderHistory() {
            const panelWidth = document.getElementById('left-panel').offsetWidth;
            const imgSize = Math.max(48, Math.min(panelWidth / 4, 120));
            document.getElementById('recent-list').innerHTML = recentHistory.map(h => `
                <div class="flex items-center gap-3 cursor-pointer group">
                    <img src="${h.cover}" class="rounded shadow-lg object-cover" style="width:${imgSize}px; height:${imgSize}px">
                    <div class="truncate">
                        <div class="font-bold truncate text-white group-hover:underline text-sm">${h.albumName}</div>
                        <div class="text-xs text-zinc-500">${h.artist}</div>
                    </div>
                </div>`).join('');
        }

        function initResizers() {
            const left = document.getElementById('left-panel');
            const resizerL = document.getElementById('resizer-l');
            resizerL.onmousedown = (e) => {
                document.onmousemove = (e) => { left.style.width = e.clientX + 'px'; renderHistory(); };
                document.onmouseup = () => document.onmousemove = null;
            };
        }

        window.onload = init;
    </script>
</body>
</html>
