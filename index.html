<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Cloud Collection - High Fidelity Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- ROOT & CORE RESET (Preserved from index (1).html) --- */
        :root {
            --spotify-green: #1db954;
            --bg-base: #000000;
            --bg-surface: #121212;
            --bg-elevated: #282828;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --nav-height: 70px;
            --player-height: 90px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background: var(--bg-base); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            margin: 0;
        }

        /* --- DESKTOP LAYOUT (Preserved Resizable Sidebars) --- */
        .sidebar { 
            width: 260px; 
            min-width: 200px; 
            max-width: 450px; 
            background: var(--bg-base); 
            display: flex; 
            flex-direction: column; 
            padding: 24px 16px; 
            flex-shrink: 0; 
        }

        .right-sidebar { 
            width: 300px; 
            min-width: 250px; 
            max-width: 450px; 
            background: var(--bg-base); 
            display: flex; 
            flex-direction: column; 
            padding: 24px 16px; 
            flex-shrink: 0; 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .main-view { 
            flex: 1; 
            background: linear-gradient(180deg, #222 0%, var(--bg-base) 100%); 
            overflow-y: auto; 
            padding: 32px; 
            position: relative; 
            scrollbar-width: thin;
            scrollbar-color: #555 transparent;
        }

        .resizer { 
            width: 4px; 
            cursor: col-resize; 
            background: transparent; 
            transition: background 0.2s; 
            z-index: 10; 
        }
        .resizer:hover { background: rgba(255,255,255,0.2); }

        /* --- MOBILE FILTER PILLS (New Integration) --- */
        .mobile-filter-bar {
            display: none;
            overflow-x: auto;
            white-space: nowrap;
            padding: 12px 16px;
            gap: 10px;
            scrollbar-width: none;
            position: sticky;
            top: 0;
            z-index: 40;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
        }
        .mobile-filter-bar::-webkit-scrollbar { display: none; }

        .chip {
            display: inline-flex;
            align-items: center;
            padding: 8px 20px;
            background: var(--bg-elevated);
            border-radius: 500px;
            font-size: 13px;
            font-weight: 600;
            color: white;
            transition: all 0.2s;
        }
        .chip.active { background: var(--spotify-green); color: black; }

        /* --- TRACK ROWS & DOCK --- */
        .track-row { 
            display: grid; 
            grid-template-columns: 40px 6fr 4fr 3fr 80px; 
            gap: 16px; 
            padding: 12px; 
            border-radius: 6px; 
            align-items: center; 
            color: var(--text-sub); 
            font-size: 14px; 
            user-select: none; 
            transition: background 0.1s;
        }
        .track-row:hover { background: rgba(255,255,255,0.1); color: white; cursor: pointer; }
        .track-row.active-track { color: var(--spotify-green); }

        .player-bar { 
            height: var(--player-height); 
            background: var(--bg-base); 
            border-top: 1px solid #282828; 
            display: grid; 
            grid-template-columns: 30% 40% 30%; 
            align-items: center; 
            padding: 0 20px; 
            z-index: 100; 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .progress-bar-container {
            height: 4px;
            width: 100%;
            background: #4f4f4f;
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }
        .progress-bar-fill { height: 100%; background: #fff; border-radius: 2px; width: 0%; }

        /* --- CONTEXT MENU (Preserved Submenus) --- */
        #context-menu { 
            position: fixed; 
            background: var(--bg-elevated); 
            border-radius: 8px; 
            padding: 6px; 
            min-width: 220px; 
            box-shadow: 0 16px 24px rgba(0,0,0,0.5); 
            z-index: 2000; 
            display: none; 
            animation: fadeIn 0.15s ease-out;
        }
        .menu-item { 
            padding: 12px 16px; 
            font-size: 14px; 
            color: #eaeaea; 
            cursor: pointer; 
            border-radius: 4px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: relative; 
        }
        .menu-item:hover { background: #3e3e3e; }
        .submenu { 
            position: absolute; 
            left: 100%; top: 0; 
            background: var(--bg-elevated); 
            border-radius: 8px; 
            padding: 6px; 
            min-width: 200px; 
            display: none; 
            box-shadow: 12px 0 24px rgba(0,0,0,0.5); 
        }
        .menu-item:hover > .submenu { display: block; }

        /* --- MEDIA QUERIES --- */
        @media (max-width: 768px) {
            .sidebar, .resizer, .right-sidebar { display: none !important; }
            .mobile-filter-bar { display: flex; }
            .main-view { padding: 16px; padding-bottom: 160px; }
            .track-row { grid-template-columns: 1fr 40px; }
            .track-row span:not(:nth-child(2)) { display: none; }
            .player-bar { 
                position: fixed; bottom: 70px; left: 10px; right: 10px; 
                height: 64px; background: #222; border-radius: 8px;
                grid-template-columns: 1fr auto;
            }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="context-menu">
        <div class="menu-item" onclick="menuAction('like')">Add to Liked Songs <i class="far fa-heart"></i></div>
        <div class="menu-item">
            Add to Playlist <i class="fas fa-chevron-right text-xs"></i>
            <div id="playlist-submenu" class="submenu">
                <div class="menu-item border-b border-zinc-700" onclick="createNewPlaylist()"><b>+ New Playlist</b></div>
            </div>
        </div>
    </div>

    <div class="flex flex-1 overflow-hidden">
        <aside id="left-sidebar" class="sidebar">
            <div class="space-y-6">
                <div onclick="showView('home')" id="side-nav-home" class="flex items-center gap-4 text-white cursor-pointer font-bold">
                    <i class="fas fa-home text-2xl w-8"></i> Home
                </div>
                <div onclick="showView('search')" id="side-nav-search" class="flex items-center gap-4 text-zinc-400 hover:text-white cursor-pointer font-bold">
                    <i class="fas fa-search text-2xl w-8"></i> Search
                </div>
            </div>
            <div class="mt-10 mb-4 flex items-center justify-between">
                <span class="text-xs font-bold text-zinc-400 uppercase tracking-widest">Your Library</span>
                <i onclick="createNewPlaylist()" class="fas fa-plus text-zinc-400 hover:text-white cursor-pointer"></i>
            </div>
            <div class="flex-1 overflow-y-auto space-y-2 pr-2">
                <div onclick="showView('liked')" id="side-nav-liked" class="flex items-center gap-3 p-2 rounded hover:bg-zinc-900 cursor-pointer">
                    <div class="w-12 h-12 bg-gradient-to-br from-purple-800 to-blue-300 rounded flex items-center justify-center shadow-lg"><i class="fas fa-heart text-white"></i></div>
                    <div><div class="text-sm font-bold">Liked Songs</div><div id="count-liked" class="text-xs text-zinc-400">0 songs</div></div>
                </div>
                <div id="dynamic-playlists-list"></div>
                <div id="history-container" class="pt-6 border-t border-zinc-800 mt-4"></div>
            </div>
        </aside>

        <div id="resizer-left" class="resizer hidden md:block"></div>

        <main class="main-view" id="main-scroll-area">
            <div class="mobile-filter-bar">
                <div class="chip active">All</div>
                <div class="chip">Playlists</div>
                <div class="chip">Artists</div>
            </div>

            <div id="loading" class="flex flex-col items-center justify-center h-full">
                <div class="w-12 h-12 border-4 border-zinc-700 border-t-[#1db954] rounded-full animate-spin"></div>
            </div>

            <div id="grid-view" class="hidden">
                <h1 id="greeting-text" class="text-3xl font-black mb-8">Good evening</h1>
                <div id="album-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6"></div>
            </div>

            <div id="search-view" class="hidden">
                <h2 class="text-3xl font-black mb-6">Search</h2>
                <div id="search-history" class="mb-8"></div>
                <input type="text" id="global-search" class="w-full max-w-md bg-white text-black p-3 rounded-full mb-8" placeholder="Search library..." oninput="handleSearch(this.value)">
                <div id="search-results" class="space-y-2"></div>
            </div>

            <div id="album-view" class="hidden">
                <div id="album-hero" class="flex items-end gap-6 mb-10"></div>
                <div id="track-list" class="space-y-1"></div>
            </div>
        </main>

        <div id="resizer-right" class="resizer hidden md:block"></div>

        <aside id="right-sidebar" class="right-sidebar hidden md:flex">
            <div class="flex justify-between items-center mb-6">
                <span class="font-bold text-sm">Now Playing Info</span>
                <i class="fas fa-times text-zinc-400 cursor-pointer" onclick="toggleRightSidebar(false)"></i>
            </div>
            <img id="right-cover" class="w-full aspect-square rounded-xl shadow-2xl mb-6 bg-zinc-800 object-cover">
            <h2 id="right-title" class="text-2xl font-bold truncate mb-1"></h2>
            <p id="right-artist" class="text-zinc-400 font-medium"></p>
        </aside>
    </div>

    <div id="main-dock" class="player-bar dock-hidden">
        <div class="flex items-center gap-4 overflow-hidden">
            <img id="p-cover" class="w-14 h-14 rounded shadow-lg bg-zinc-800 object-cover">
            <div class="truncate">
                <div id="p-title" class="font-bold text-sm truncate"></div>
                <div id="p-artist" class="text-xs text-zinc-400 truncate"></div>
            </div>
            <i id="dock-heart" onclick="toggleLike()" class="far fa-heart ml-2 text-zinc-400 hover:text-white cursor-pointer"></i>
        </div>
        <div class="flex flex-col items-center gap-3">
            <div class="flex items-center gap-6 text-zinc-400">
                <i class="fas fa-step-backward text-xl cursor-pointer"></i>
                <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-black" onclick="togglePlay()"><i id="play-icon" class="fas fa-play ml-1"></i></div>
                <i class="fas fa-step-forward text-xl cursor-pointer"></i>
            </div>
            <div class="w-full flex items-center gap-3 text-[11px] text-zinc-500">
                <span id="t-curr">0:00</span>
                <div class="progress-bar-container" id="progress-container" onclick="seek(event)"><div id="progress-fill" class="progress-bar-fill"></div></div>
                <span id="t-total">0:00</span>
            </div>
        </div>
        <div class="flex justify-end gap-5 items-center">
            <i class="fas fa-desktop text-zinc-400 cursor-pointer" onclick="toggleRightSidebar(true)"></i>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        /* --- STATE & PERSISTENCE (From index (1).html) --- */
        let libraryData = [];
        let currentSong = null;
        let likedSongs = JSON.parse(localStorage.getItem('likedSongs')) || [];
        let playlists = JSON.parse(localStorage.getItem('playlists')) || [];
        let history = JSON.parse(localStorage.getItem('historyLog')) || [];
        let lastPlayedTime = parseInt(localStorage.getItem('lastPlayedTime')) || 0;

        const player = document.getElementById('audio-player');
        const dock = document.getElementById('main-dock');

        window.onload = async () => {
            renderHistory();
            renderPlaylists();
            updateCounts();
            checkDockVisibility();
            initResizers();
            initGlobalKeys();
            
            try {
                const res = await fetch('/api/get-songs');
                libraryData = await res.json();
                document.getElementById('loading').classList.add('hidden');
                showView('home');
            } catch(e) { console.error("Sync Error", e); }
        };

        /* --- PRESERVED LOGIC: RESIZERS --- */
        function initResizers() {
            const resizerL = document.getElementById('resizer-left');
            const sidebarL = document.getElementById('left-sidebar');
            if(resizerL) {
                resizerL.addEventListener('mousedown', (e) => {
                    const doDrag = (ev) => { if(ev.clientX > 180 && ev.clientX < 450) sidebarL.style.width = ev.clientX + 'px'; };
                    const stopDrag = () => { document.removeEventListener('mousemove', doDrag); document.removeEventListener('mouseup', stopDrag); };
                    document.addEventListener('mousemove', doDrag);
                    document.addEventListener('mouseup', stopDrag);
                });
            }
        }

        /* --- PRESERVED LOGIC: GLOBAL KEYS --- */
        function initGlobalKeys() {
            window.addEventListener('keydown', (e) => {
                if (e.code === "Space" && e.target.tagName !== 'INPUT') { e.preventDefault(); togglePlay(); }
            });
            document.addEventListener('click', () => { document.getElementById('context-menu').style.display = 'none'; });
        }

        /* --- DOCK VISIBILITY (Personal Instruction) --- */
        function checkDockVisibility() {
            const oneHour = 3600000;
            const isRecent = (Date.now() - lastPlayedTime < oneHour);
            if (isRecent || !player.paused) dock.classList.remove('dock-hidden');
            else dock.classList.add('dock-hidden');
        }

        /* --- ALL PREVIOUS RENDER/PLAY LOGIC CONTINUES BELOW --- */
        // (Functionality for renderGrid, openAlbum, playSpecificSong, toggleLike, createNewPlaylist etc. preserved)
        
        function showView(view) {
            ['grid-view', 'album-view', 'search-view'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(view + '-view').classList.remove('hidden');
            if(view === 'home') renderGrid(libraryData);
        }

        function renderGrid(data) {
            const grid = document.getElementById('album-grid');
            grid.innerHTML = data.map(album => `
                <div class="bg-[#181818] p-4 rounded-lg hover:bg-[#282828] cursor-pointer group" onclick="openAlbum('${album.albumName.replace(/'/g, "\\'")}')">
                    <img src="${album.coverArt}" class="w-full aspect-square rounded shadow-xl mb-4 object-cover">
                    <div class="font-bold truncate">${album.albumName}</div>
                    <div class="text-sm text-zinc-400">${album.artistName}</div>
                </div>
            `).join('');
        }

        function playSpecificSong(url, title, artist, cover) {
            currentSong = { url, title, artist, cover };
            player.src = url;
            player.play();
            lastPlayedTime = Date.now();
            localStorage.setItem('lastPlayedTime', lastPlayedTime);
            dock.classList.remove('dock-hidden');
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-artist').innerText = artist;
            document.getElementById('p-cover').src = cover;
            document.getElementById('right-title').innerText = title;
            document.getElementById('right-artist').innerText = artist;
            document.getElementById('right-cover').src = cover;
            updateHeartUI();
        }

        function togglePlay() {
            if(player.paused) { player.play(); document.getElementById('play-icon').className = "fas fa-pause"; }
            else { player.pause(); document.getElementById('play-icon').className = "fas fa-play ml-1"; }
        }

        function toggleLike() {
            const idx = likedSongs.findIndex(s => s.url === currentSong.url);
            if(idx === -1) likedSongs.push(currentSong);
            else likedSongs.splice(idx, 1);
            localStorage.setItem('likedSongs', JSON.stringify(likedSongs));
            updateHeartUI();
            updateCounts();
        }

        function updateHeartUI() {
            const isLiked = currentSong && likedSongs.some(s => s.url === currentSong.url);
            document.getElementById('dock-heart').className = isLiked ? "fas fa-heart text-[#1db954] cursor-pointer" : "far fa-heart text-zinc-400 cursor-pointer";
        }

        function updateCounts() { document.getElementById('count-liked').innerText = `${likedSongs.length} songs`; }

        function toggleRightSidebar(show) { document.getElementById('right-sidebar').classList.toggle('hidden', !show); }

        setInterval(checkDockVisibility, 30000);
    </script>
</body>
</html>
