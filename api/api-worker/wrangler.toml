name = "reson-api-worker"           # name for this Worker
main = "index.js"                   # path to your Worker code
compatibility_date = "2026-04-02"  # Cloudflare versioning date

[[r2_buckets]]
binding = "MUSIC_BUCKET"           # must match env.MUSIC_BUCKET in your code
bucket_name = "reson-music"        # replace with your actual R2 bucket name